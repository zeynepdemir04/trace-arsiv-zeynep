<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>TRACE Arşivi</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: #f7f8fa;
  color: #1f2430;
  padding: 24px 32px;
  min-height: 100vh;
}
.container { max-width: 1600px; margin: 0 auto; }

.topbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 14px;
  gap: 16px;
  flex-wrap: wrap;
}
.topbar h1 { font-size: 24px; letter-spacing: 0.3px; color: #1f2430; }
.topbar .sub { color: #6b7280; font-size: 13px; margin-top: 2px; }

.btn {
  background: #ffffff;
  border: 1px solid #d8dde5;
  color: #1f2430;
  padding: 8px 16px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 13px;
  font-weight: 500;
  transition: all 0.15s ease;
  box-shadow: 0 1px 2px rgba(15,20,30,0.04);
}
.btn:hover { background: #f0f2f6; border-color: #c2c8d3; }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }
.btn:disabled:hover { background: #ffffff; border-color: #d8dde5; }

/* Search bar — top, full width */
.search-bar {
  margin-bottom: 12px;
  position: relative;
}
.search-bar input {
  width: 100%;
  background: #ffffff;
  border: 1px solid #d8dde5;
  border-radius: 10px;
  padding: 12px 16px 12px 42px;
  font-size: 14px;
  color: #1f2430;
  font-family: inherit;
  outline: none;
  box-shadow: 0 1px 2px rgba(15,20,30,0.03);
  transition: border-color 0.15s, box-shadow 0.15s;
}
.search-bar input:focus {
  border-color: #6b8cf2;
  box-shadow: 0 0 0 3px rgba(107,140,242,0.12);
}
.search-bar::before {
  content: '🔍';
  position: absolute;
  left: 14px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 14px;
  opacity: 0.5;
}

/* Controls row */
.controls {
  display: flex;
  gap: 10px;
  align-items: center;
  flex-wrap: wrap;
  margin-bottom: 16px;
  padding: 12px 16px;
  background: #ffffff;
  border: 1px solid #e3e6ec;
  border-radius: 10px;
  box-shadow: 0 1px 2px rgba(15,20,30,0.03);
}
.control-group { display: flex; align-items: center; gap: 8px; }
.control-group label {
  font-size: 12px;
  color: #6b7280;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.input, .select {
  background: #ffffff;
  border: 1px solid #d8dde5;
  border-radius: 7px;
  padding: 7px 11px;
  font-size: 13px;
  color: #1f2430;
  font-family: inherit;
  outline: none;
  transition: border-color 0.15s, box-shadow 0.15s;
}
.input:focus, .select:focus {
  border-color: #6b8cf2;
  box-shadow: 0 0 0 3px rgba(107,140,242,0.15);
}
.range-input { width: 60px; text-align: center; }
.range-sep { color: #9aa1ad; font-size: 13px; }

.divider { width: 1px; height: 22px; background: #e3e6ec; }

.pager {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-left: auto;
}
.pager .page-info {
  font-size: 13px;
  color: #4b5160;
  padding: 0 8px;
  font-variant-numeric: tabular-nums;
}
.pager .page-btn {
  padding: 6px 10px;
  font-size: 13px;
  min-width: 32px;
}
.results-info {
  font-size: 12px;
  color: #6b7280;
  margin-left: 6px;
}

.list { display: flex; flex-direction: column; gap: 10px; }

.trace {
  background: #ffffff;
  border: 1px solid #e3e6ec;
  border-radius: 10px;
  overflow: hidden;
  box-shadow: 0 1px 2px rgba(15,20,30,0.03);
}
.trace-header {
  padding: 14px 20px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 16px;
  user-select: none;
  transition: background 0.15s;
}
.trace-header:hover { background: #f7f8fa; }
.caret {
  color: #9aa1ad;
  font-size: 12px;
  transition: transform 0.2s;
  width: 12px;
  display: inline-block;
}
.trace.open .caret { transform: rotate(90deg); }
.num { font-weight: 700; color: #9aa1ad; font-size: 13px; min-width: 50px; }
.title { font-size: 15px; font-weight: 500; flex: 1; color: #1f2430; }
.meta { font-size: 12px; color: #6b7280; }

.trace-body {
  display: none;
  padding: 6px 20px 22px 20px;
  border-top: 1px solid #eef0f4;
  background: #fafbfc;
}
.trace.open .trace-body { display: block; }

.chain-row {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  margin-top: 14px;
  flex-wrap: nowrap;
  overflow-x: auto;
  padding-bottom: 6px;
}

.col-wrap {
  flex: 1 1 0;
  min-width: 140px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.node {
  background: #e8f5ec;
  border: 1px solid #b6dcc1;
  border-radius: 8px;
  padding: 8px 10px;
  text-align: center;
  font-size: 13px;
  line-height: 1.3;
  color: #1f6b3a;
  font-weight: 500;
  display: flex;
  align-items: center;
  justify-content: center;
  height: 78px;
  overflow: hidden;
}
.node.muted {
  background: #f0f2f6;
  border-color: #d8dde5;
  color: #4b5160;
  font-weight: 400;
}

.decoy {
  background: #fdf2f3;
  border: 1px dashed #f0c2c5;
  color: #a85560;
  padding: 6px 8px;
  font-size: 12px;
  border-radius: 7px;
  text-align: center;
  line-height: 1.3;
  font-weight: 400;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 5px;
  height: 50px;
  overflow: hidden;
}
.decoy::before {
  content: '✗';
  color: #d97078;
  font-weight: 700;
  font-size: 11px;
  flex-shrink: 0;
}

.connector {
  display: flex;
  align-items: center;
  height: 78px;
  flex-shrink: 0;
}
.arrow { color: #b8bdc7; font-size: 16px; }

.step-num {
  font-size: 10px;
  color: #8a93a6;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 4px;
  font-weight: 500;
}
.node.muted .step-num { color: #9aa1ad; }
.node-content { display: flex; flex-direction: column; gap: 2px; }

.empty {
  text-align: center;
  padding: 40px;
  color: #9aa1ad;
  font-size: 14px;
}

@media (max-width: 1100px) {
  .col-wrap { min-width: 130px; }
}

.explain-list {
  margin-top: 18px;
  padding-top: 14px;
  border-top: 1px solid #eef0f3;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.explain-title {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: #8a93a6;
  font-weight: 600;
  margin-bottom: 2px;
}
.explain-row {
  display: flex;
  gap: 10px;
  align-items: flex-start;
}
.ex-num {
  flex-shrink: 0;
  width: 20px;
  height: 20px;
  margin-top: 1px;
  border-radius: 50%;
  background: #e8f5ec;
  border: 1px solid #b6dcc1;
  color: #1f6b3a;
  font-size: 11px;
  font-weight: 600;
  display: flex;
  align-items: center;
  justify-content: center;
}
.ex-text {
  font-size: 13px;
  line-height: 1.55;
  color: #3a4150;
}
.ex-text b { color: #1f6b3a; font-weight: 600; }
.ex-text b::after { content: ' — '; color: #b8bdc7; font-weight: 400; }
</style>
</head>

<script>
const TRACES = [{"num": 1, "title": "Köyden Şehir Hayatına", "meta": "12 Mayıs 2026 | Zorluk: ⭐ | Konu: Sosyoloji & Yaşam", "start": "Traktörün Köye Gelişi", "steps": [{"n": 1, "correct": "Tarımda Makineleşme", "wrong": ["Modern Sulama", "Tohum Islahı"], "aciklama": "Bir traktör onlarca işçinin yerini tutunca, köyde \"boşa çıkan\" eller çoğaldı. Toprak artık herkese yetmiyordu."}, {"n": 2, "correct": "Büyük Şehirlere Göç", "wrong": ["Köyde Sanayileşme", "Tarım Kooperatifi"], "aciklama": "İşsiz kalan köylü, şansını denemek için \"taşı toprağı altın\" denilen büyük şehirlere, İstanbul’a, Ankara’ya akın etti."}, {"n": 3, "correct": "İlk Gecekondu Mahalleleri", "wrong": ["Toplu Konutlar", "Şehir Planlama"], "aciklama": "Şehirler bu kalabalığa hazır değildi. İnsanlar barınmak için bir gecede kendi mahallelerini, kendi evlerini inşa etmek zorunda kaldı."}, {"n": 4, "correct": "Şehirleşme Yasaları", "wrong": ["Belediye Parkları", "Yol Yapım Çalışmaları"], "aciklama": "Devlet, kontrolsüz büyüyen bu yerleşimleri düzene sokmak için yeni yasalar çıkardı; mahalleler yavaş yavaş sisteme dahil oldu."}, {"n": 5, "correct": "Apartman Kültürü", "wrong": ["Müstakil Evler", "Bahçeli Siteler"], "aciklama": "Yer yetmeyince evler göğe doğru yükselmeye başladı. Artık komşuluk \"kapı önünde\" değil, \"asansörde\" yaşanır oldu."}, {"n": 6, "correct": "Modern Metropol Hayatı", "wrong": ["Köye Dönüş Projesi", "Yayla Turizmi"], "aciklama": "Traktörün tarladan kovduğu o sessizlik, bugün milyonlarca insanın yaşadığı devasa beton ormanlara ve hızlı metropol hayatına dönüştü."}], "creator": "Önceki"}, {"num": 2, "title": "Mahalle Maçından E-Spor'a", "meta": "19 Mayıs 2026 | Zorluk: ⭐ | Konu: Spor & Eğlence", "start": "Mahalle Arası Maçlar", "steps": [{"n": 1, "correct": "Profesyonel Liglerin Kurulması", "wrong": ["Spor Salonları", "Okul Bahçeleri"], "aciklama": "Boş arsalarda iki taşla kurulan kaleler, zamanla kuralları olan profesyonel stadyumlara ve dev takımlara yerini bıraktı."}, {"n": 2, "correct": "Radyoda Maç Heyecanı", "wrong": ["Gazete Spor Sayfaları", "Maç Biletleri"], "aciklama": "Stadyuma gidemeyenler radyoya sarıldı. Spikerin nefes kesen anlatımıyla hayallerde canlanan pozisyonlar tüm Türkiye’yi birleştirdi."}, {"n": 3, "correct": "Canlı Yayın Devrimi", "wrong": ["Özet Görüntüler", "Spor Yazarları"], "aciklama": "Televizyonun gelişiyle \"anlatılan\" değil \"izlenen\" spor çağı başladı. Artık golü sadece duymuyor, her açıdan tekrar tekrar görüyorduk."}, {"n": 4, "correct": "Video Oyunları (Atari)", "wrong": ["Masa Tenisi", "Sokak Oyunları"], "aciklama": "İzlemek yetmedi, \"yönetmek\" istedik. Atari ve oyun konsollarıyla futbol sahası televizyonun içine, bizim ellerimize geçti."}, {"n": 5, "correct": "Online Rekabet", "wrong": ["Tek Kişilik Oyun", "Oyun Konsolu"], "aciklama": "İnternetin gelmesiyle sadece bilgisayara karşı değil, dünyanın öbür ucundaki gerçek rakiplere karşı oynamaya başladık."}, {"n": 6, "correct": "Küresel E-Spor Arenaları", "wrong": ["İnternet Kafeler", "Oyun Mağazaları"], "aciklama": "Mahalledeki tozlu sahalardan, bugün binlerce kişinin stadyumlarda izlediği ve milyon dolarlık ödüllerin dağıtıldığı dev dijital arenalara ulaştık."}], "creator": "Önceki"}, {"num": 3, "title": "Mağara Resminden Emoji'ye", "meta": "8 Mayıs 2026 | Zorluk: ⭐⭐ | Konu: Sanat & İletişim", "start": "Mağara Duvarına Çizim", "steps": [{"n": 1, "correct": "Hiyeroglif Yazısı", "wrong": ["Latin Alfabesi", "Matbaa Baskısı"], "aciklama": "Mısırlılar bu çizimleri sistematik bir yazıya dönüştürdü. Her resim artık rastgele değil, belirli bir anlam ya da sesi temsil ediyordu.\""}, {"n": 2, "correct": "Piktogramlar (Tabelalar)", "wrong": ["El Yazması Kitaplar", "Gazete Başlıkları"], "aciklama": "Karmaşık yazı sistemlerine rağmen görselin gücü bitmedi. Yol kenarına dikilen tehlike işareti ya da kapıya çizilen basit bir figür, okuma yazma bilmeyene de aynı mesajı iletebiliyordu."}, {"n": 3, "correct": "Bilgisayar İkonları", "wrong": ["Daktilo Tuşları", "Grafik Tasarım"], "aciklama": "İlk bilgisayarlarda kod yazmak yerine, küçük bir çöp kutusu veya klasör resmine tıklamak işleri kolaylaştırdı. Görseller komutlara dönüştü."}, {"n": 4, "correct": "Metin Emoticonları :)", "wrong": ["Kısa Mesaj", "E-posta"], "aciklama": "Yazışırken duyguları aktarmak zordu. İki nokta ve parantezle yapılan gülen surat, dijital sohbetlere ilk kez ton kattı."}, {"n": 5, "correct": "Japon Mobil Pikto-Karakterleri", "wrong": ["Dokunmatik Ekran", "Sesli Komut"], "aciklama": "1999'da Japonya'da, mesaj kutusu 250 karakterle sınırlıyken bir tasarımcı farklı bir yol denedi: 12x12 piksellik küçük çizimlerle duyguları anlatmak. 176 minik resimden oluşan bu set, dünyaya yeni bir dil armağan edecekti."}, {"n": 6, "correct": "Emoji", "wrong": ["GIF", "Sticker"], "aciklama": "Bu Japonca kelime \"resim-karakter\" 2010'da Unicode'a girdiğinde dünya dili oldu. Mağara duvarındaki o ilk av resmi, binlerce yıl sonra cebimizdeki \"emoji\"ye dönüştü."}], "creator": "Önceki"}, {"num": 4, "title": "Kahveden İnce Belli Bardağa", "meta": "3 Mayıs 2026 | Zorluk: ⭐ | Konu: Kültür & Gelenek", "start": "Osmanlı Kahve Kültürü", "steps": [{"n": 1, "correct": "Kahvenin Tamamıyla İthal Edilmesi", "wrong": ["Kahvehanelerin Yasaklanması", "Yerli Kahve Üretiminin Başlaması"], "aciklama": "Osmanlı'nın vazgeçilmezi kahve, tamamen Yemen ve Brezilya'ya bağımlı bir üründü. Bu bağımlılık, lojistiğin aksadığı ilk anda büyük bir boşluğa dönüşecekti."}, {"n": 2, "correct": "I. Dünya Savaşı ve Ambargolar", "wrong": ["Gümrük Vergilerinin Artışı", "Modern Tarım Tekniklerine Geçiş"], "aciklama": "Savaş ticaret yollarını kapattı, ambargolar ithalatı durdurdu. Halkın en büyük alışkanlığı kahve, bir anda ulaşılmaz bir lükse dönüştü."}, {"n": 3, "correct": "Karadeniz'de Çay Arayışı", "wrong": ["Şeker Fabrikası Kurulumu", "Tütün Üretimi Teşviki"], "aciklama": "Kahvenin yerini tutabilecek tek aday çaydı. Rotayı Karadeniz’e çeviren uzmanlar, Rize’nin nemli havasının tam da aranan yer olduğunu buldu."}, {"n" nikleri"], "aciklama": "Tarlalara sığmayan bu kalabalık şehirlere, fabrikalara akmaya başladı. Sanayi Devrimi’ni yürütecek milyonlarca işçi hazırdı."}, {"n": 4, "correct": "Montaj Hattı Sistemi", "wrong": ["Demir Yolu Taşımacılığı", "Liman Ticareti Hacmi"], "aciklama": "Fabrikalarda üretim hızlanmalıydı. Parçaların bir bant üzerinde ilerlediği \"montaj hattı\", hızın yeni adı oldu."}, {"n": 5, "correct": "Süratli Servis Sistemi", "wrong": ["Kendi Kendine Servis", "Endüstriyel Mutfak Ekipmanları"], "aciklama": "Montaj hattı mantığı mutfağa taşındı. Her çalışanın tek bir işten sorumlu olduğu \"Süratli Servis Sistemi\" ile hamburger, bir bandın sonunda paketlenmiş halde çıkan standart bir ürüne dönüştü."}, {"n": 6, "correct": "McDonald's", "wrong": ["Burger King", "KFC"], "aciklama": "1948'de bu sistemi kuran McDonald kardeşlerin restoranını gören Ray Kroc, franchise modeliyle formülü dünyaya yaydı. Kolomb'un gemisindeki patates, her kıtada aynı tatta kızaran küresel bir ürüne dönüştü."}], "creator": "Önceki"}, {"num": 13, "title": "Kodak'tan Instagram'a", "meta": "4 Mayıs 2026 | Zorluk: ⭐⭐ | Konu: Teknoloji & Görsel Kültür", "start": "Kodak Film Tekeli", "steps": [{"n": 1, "correct": "Dijital Kameranın İcadı", "wrong": ["Anlık Fotoğraf Makinesi", "Renkli Film Teknolojisi"], "aciklama": "Kodak kendi laboratuvarında filmsiz kamerayı icat etti. Ancak film satmaya o kadar alışmışlardı ki bu \"filmsiz\" geleceği rafa kaldırdılar."}, {"n": 2, "correct": "Teknolojinin Gizlenmesi", "wrong": ["Seri Üretim Kararı", "Rakiplerle İş Birliği"], "aciklama": "Kodak yönetimi bu icadı bir tehdit olarak görüp sakladı. Ancak bu teknoloji durdurulamazdı; rakipler dijital dünyaya çoktan yelken açmıştı."}, {"n": 3, "correct": "Tüketici Tipi Dijital Kamera", "wrong": ["Profesyonel Stüdyo Ekipmanı", "Video Kayıt Cihazları"], "aciklama": "Kodak raflarda beklerken Sony, Fuji ve Canon boşluğu doldurdu. 1990'ların sonunda dijital kameralar küçüldü, ucuzladı ve her eve girdi; \"poz bitti\" ya da \"film yandı\" derdi tarihe karışıyordu."}, {"n": 4, "correct": "Akıllı Telefon Kamerası", "wrong": ["İnternet Bağlantı Hızı", "Dokunmatik Ekran Modası"], "aciklama": "Kamera teknolojisi o kadar küçüldü ki artık telefonlarımızın vazgeçilmez bir parçası oldu. Cebimizde sürekli bir objektifle gezer hale geldik."}, {"n": 5, "correct": "Fotoğraf Paylaşma İhtiyacı", "wrong": ["Bulut Depolama Hizmeti", "Mesajlaşma Uygulaması"], "aciklama": "Her anımızı çeker hale gelince, bunları birilerine göstermek de şart oldu. \"Bakın ben ne yiyorum\" kültürü sosyal ağları tetikledi."}, {"n": 6, "correct": "Instagram", "wrong": ["Facebook", "Flickr"], "aciklama": "Kodak'ın bir zamanlar korkup sakladığı dijital kareler, bugün Instagram üzerinden saniyede binlerce beğeni alarak dünyayı dolaşıyor."}], "creator": "Önceki"}, {"num": 14, "title": "Napster'dan Spotify'a", "meta": "5 Mayıs 2026 | Zorluk: ⭐⭐ | Konu: Müzik & Dijital Dünya", "start": "Napster", "steps": [{"n": 1, "correct": "Müzikte Ücretsiz Paylaşım", "wrong": ["CD Satışlarının Artışı", "Radyo Yayıncılığı Devrimi"], "aciklama": "Napster ile müzik bir anda internette \"beleş\" oldu. Dev müzik şirketleri neye uğradığını şaşırdı; müzik artık bir dosyaydı."}, {"n": 2, "correct": "Müzikte Telif Hakları Krizi", "wrong": ["Taşınabilir CD Çalar", "Müzik Video Kanalları"], "aciklama": "Sanatçılar ve şirketler dava üstüne dava açtı. Müzik dünyası çökmek üzereydi çünkü kimse artık albümlere para ödemek istemiyordu."}, {"n": 3, "correct": "Dijital Müzik Mağazası", "wrong": ["Sosyal Medya Profilleri", "İnternet Üzerinden Radyo"], "aciklama": "Apple, iTunes ile sahneye çıktı. Şarkıları tek tek ve yasal olarak ucuza satmaya başladı. İnsanlar korsandan yavaş yavaş \"yasal ve dijital\"e geçti."}, {"n": 4, "correct": "Aylık Abonelik Modeli", "wrong": ["Şarkı Başı Ödeme", "Ücretsiz Radyo Akışı"], "aciklama": "Satın alma devri de kapandı. Spotify, \"şarkıya sahip olma, hepsine küçük bir ücretle istediğin an ulaş\" diyerek kuralları tekrar yazdı."}, {"n": 5, "correct": "Kişiselleştirilmiş Öneri Sistemi", "wrong": ["Konser Biletlerinin Ucuzlaması", "Müzik Gruplarının Azalması"], "aciklama": "Kütüphane devasa olunca, algoritmalar devreye girdi. \"Sen bunu sevdin, bak bunu da seversin\" diyen listeler müziğin yeni keşif yolu oldu."}, {"n": 6, "correct": "Spotify", "wrong": ["Apple Music", "YouTube Music"], "aciklama": "Bir üniversite öğrencisinin yarattığı korsan krizinden, bugün cebimizde milyonlarca şarkı ve \"Haftalık Keşif\" listeleriyle yaşayan dev bir müzik evreni doğdu."}], "creator": "Önceki"}, {"num": 15, "title": "Nasreddin Hoca'dan Stand-Up'a", "meta": "6 Mayıs 2026 | Zorluk: ⭐⭐ | Konu: Türkiye & Mizah Kültürü", "start": "Nasreddin Hoca Fıkraları", "steps": [{"n": 1, "correct": "Geleneksel Orta oyunu", "wrong": ["Saray Tiyatrosu", "Yazılı Edebiyat Akımı"], "aciklama": "Nasreddin Hoca'nın hazırcevaplığı meydanlara taşındı. Pişekar ve Kavuklu gibi tiplerle, halkın derdini gülerek anlattığı Ortaoyunu doğdu."}, {"n": 2, "correct": "Tuluat (Doğaçlama) Sanatı", "wrong": ["Opera ve Bale", "Radyo Tiyatrosu"], "aciklama": "Metne bağlı kalmadan, o an akla geleni söylemek (tuluat) asıl ustalık oldu. Bu doğaçlama ruhu, Türk mizahının en büyük silahı haline geldi."}, {"n": 3, "correct": "Yazılı Mizah Geleneği", "wrong": ["Modern Dram Tiyatrosu", "Haber Bültenleri"], "aciklama": "Sahnede doğan hazırcevaplık, zamanla kâğıda da taşındı. Sözlü mizahın ritmi; karikatür, fıkra ve köşe yazılarıyla yeni bir dile dönüştü."}, {"n": 4, "correct": "Mizah Dergileri Akımı", "wrong": ["Televizyon Dizileri", "Siyasi Romanlar"], "aciklama": "Gırgır ve Leman gibi dergilerle mizah kağıda döküldü. Bu dergiler, hem zekice espri yapmayı hem de toplumu gözlemlemeyi öğreten bir okul oldu."}, {"n": 5, "correct": "Leman Kültür Sahnesi", "wrong": ["Karikatür Sergileri", "Mizah Gazeteleri"], "aciklama": "Dergi yazar ve çizerleri sahnede konuşmaya başladı. Küçük mekanlarda başlayan bu gösteriler, bugünkü dev sahnelerin ilk kıvılcımıydı."}, {"n": 6, "correct": "Cem Yılmaz", "wrong": ["Beyazıt Öztürk", "Okan Bayülgen"], "aciklama": "Nasreddin Hoca’nın nükte mirası, modern sahnelerde \"Stand-up\" olarak hayat buldu. Türk mizahı meydanlardan sinemaya, oradan da kapalı gişe şovlara ulaştı."}], "creator": "Önceki"}, {"num": 16, "title": "Mektuptan WhatsApp'a", "meta": "7 Mayıs 2026 | Zorluk: ⭐ | Konu: İletişim & Sosyal Yaşam", "start": "Mektup Yazma Kültürü", "steps": [{"n": 1, "correct": "Telgrafın Yaygınlaşması", "wrong": ["Gazetelerin Çıkışı", "Ansiklopedi Yazımı"], "aciklama": "Sayfalarca süren bekleyiş, mors alfabesiyle birkaç saniyeye indi. \"Acele\" ibaresiyle gelen mesajlar hayatın ritmini hızlandırdı."}, {"n": 2, "correct": "İlk Sesli Aramalar", "wrong": ["Radyo Yayıncılığı", "Gazete Baskısı"], "aciklama": "Sadece yazışmak yetmedi, sesi de taşımak istedik. Telefonun icadıyla birlikte mesafeler \"Alo\" diyebilecek kadar kısaldı."}, {"n": 3, "correct": "Kablosuz Haberleşme", "wrong": ["Bilgisayar Ağı", "Televizyon Sinyali"], "aciklama": "Sesin tellerden kurtulup dalgalar üzerinden taşınması, iletişimi mekan kısıtlamasından kurtardı. Bu teknik özgürlük, \"taşınabilir\" bir geleceğin kapılarını araladı."}, {"n": 4, "correct": "Cep Telefonu Devrimi", "wrong": ["Kablolu İnternet", "Uydu Yayıncılığı"], "aciklama": "Telefonlar cebe girdi. Artık birini aramak için evde olmasını beklemek gerekmiyordu; her an, her yerden \"neredesin?\" diye sorabiliyorduk."}, {"n": 5, "correct": "SMS Kültürü", "wrong": ["E-posta Servisi", "Görüntülü Arama"], "aciklama": "Aramak yerine 160 karakterle anlaşmaya başladık. \"Nbr, kib\" gibi kısaltmalarla yeni bir dijital dil geliştirdik."}, {"n": 6, "correct": "WhatsApp", "wrong": ["Messenger", "Skype"], "aciklama": "Mektubun samimiyeti, SMS'in hızı ve internetin gücü birleşti. Bugün dünyayı mavi tıklar ve ses kayıtlarıyla yönettiğimiz WhatsApp çağına geldik."}], "creator": "Önceki"}, {"num": 17, "title": "İpek Yolu'ndan İnternet Alışverişine", "meta": "9 Mayıs 2026 | Zorluk: ⭐ | Konu: Ticaret & Ekonomi", "start": "Tarihi İpek Yolu", "steps": [{"n": 1, "correct": "Ticaret Kervanları", "wrong": ["Büyük Savaşlar", "İlk Bankacılık"], "aciklama": "Develer ve atlar üzerinde kıtaları aşan mallar, dünyayı birbirine bağladı. Bir kumaş için aylar süren yolculuklar yapılıyordu."}, {"n": 2, "correct": "Liman ve Deniz Ticareti", "wrong": ["Demir Yolu Ağı", "Hava Kargo"], "aciklama": "Yolculuklar karadan denize kaydı. Dev gemiler, kervanların taşıyabileceğinden binlerce kat daha fazla malı okyanuslar ötesine ulaştırdı."}, {"n": 3, "correct": "Seri Üretim ve Mağazalar", "wrong": ["Küçük Atölyeler", "Takas Sistemi"], "aciklama": "Fabrikalar dolup taşınca, ürünler devasa mağazalarda sergilenmeye başladı. Artık çarşı-pazar gezmek bir yaşam tarzıydı."}, {"n": 4, "correct": "Katalogla Sipariş", "wrong": ["Radyo Reklamları", "El İlanları"], "aciklama": "Mağazaya gidemeyenler için ürünler bir kitaba (kataloğa) basıldı. Seçip form dolduruyordun, ürün kapına geliyordu. Tanıdık geldi mi?"}, {"n": 5, "correct": "Güvenli İnternet Ödemesi", "wrong": ["Kredi Kartı Puanı", "Kağıt Para"], "aciklama": "Kataloglar web sitelerine dönüştü. Kredi kartı bilgilerinin şifrelenmesiyle, internetten bir şeyler almak artık \"korkutucu\" olmaktan çıktı."}, {"n": 6, "correct": "E-Ticaret", "wrong": ["Borsa", "Kripto Para"], "aciklama": "İpek Yolu'ndaki devenin yükü, bugün bir kuryenin motosikletinde. Aylar süren ticaret, artık \"tek tıkla\" kapımızda."}], "creator": "Önceki"}, {"num": 18, "title": "Pusuladan Navigasyona", "meta": "10 Mayıs 2026 | Zorluk: ⭐⭐ | Konu: Keşif & Teknoloji", "start": "Pusulanın İcadı", "steps": [{"n": 1, "correct": "Açık Deniz Keşifleri", "wrong": ["Kara Savaşları", "Harita Çizimi"], "aciklama": "Pusula sayesinde gemiciler artık kıyıdan uzaklaşmaya korkmadı. Bilinmeyen denizlere açılan gemiler, dünyanın sınırlarını genişletti."}, {"n": 2, "correct": "Modern Haritacılık", "wrong": ["Yıldız Gözlemi", "Pusula Tamiri"], "aciklama": "Gidilen yerler kağıda döküldü. Artık elimizde dünyanın nasıl bir yer olduğuna dair gerçek bir plan vardı; ama hala \"tam olarak\" nerede olduğumuzu bilmiyorduk."}, {"n": 3, "correct": "Radyo Dalgalarıyla Konum", "wrong": ["Telgraf Hattı", "Hava Durumu Tahmini"], "aciklama": "Gemiler ve uçaklar, konumlarını belirlemek için gökyüzüne sinyaller göndermeye başladı. Görünmez dalgalar yeni yol göstericimiz oldu."}, {"n": 4, "correct": "Uzaya Uydu Gönderimi", "wrong": ["Aya İniş", "İnternet Kabloları"], "aciklama": "Gökyüzündeki radyo kulelerinin yerini uydular aldı. Dünyanın her yerini aynı anda görebilen bu \"gözler\", hatasız konumlama yapmaya başladı."}, {"n": 5, "correct": "Dijital Yol Haritası", "wrong": ["Basılı Atlas", "Yol Tabelası"], "aciklama": "Uydu verileri devasa veri tabanlarıyla birleşti. Artık sadece nerede olduğumuzu değil, hangi yoldan kaç dakikada gideceğimizi de biliyorduk."}, {"n": 6, "correct": "Navigasyon (GPS)", "wrong": ["Taksimetre", "Hız Göstergesi"], "aciklama": "Denizcilerin pusulası bugün cebimizde. \"Yüz metre sonra sağa dönün\" diyen ses, binlerce yıllık keşif serüveninin son durağı."}], "creator": "Önceki"}, {"num": 19, "title": "Matbaadan Sosyal Medya Kaosuna", "meta": "11 Mayıs 2026 | Zorluk: ⭐⭐ | Konu: Bilgi & İletişim", "start": "Gutenberg Matbaası", "steps": [{"n": 1, "correct": "Kitlesel Gazeteler", "wrong": ["Kitap Yazımı", "El Yazması Eserler"], "aciklama": "Matbaa sayesinde kitaplar lüks olmaktan çıktı ama asıl devrim, haberin her gün herkesin kapısına bir kağıtla (gazeteyle) gelmesiyle başladı."}, {"n": 2, "correct": "Radyo Haberleri", "wrong": ["Fotoğrafçılık", "Telgraf Hattı"], "aciklama": "Okumak istemeyenler için radyo devreye girdi. Artık haberler sadece yazılmıyor, evlerin içine kadar canlı canlı seslendiriliyordu."}, {"n": 3, "correct": "Televizyon Yayıncılığı", "wrong": ["Renkli Film", "Sinema Salonu"], "aciklama": "Görüntü de gelince işin rengi değişti. Televizyon, dünyayı bir ekranın içine sığdırıp oturma odamızın baş köşesine yerleştirdi."}, {"n": 4, "correct": "İnternet Portalları", "wrong": ["Uydu Alıcısı", "Kablolu TV"], "aciklama": "Yayın saati bekleme devri bitti. İnternetle birlikte bilgiye istediğimiz an ulaşabileceğimiz devasa bir kütüphane açıldı."}, {"n": 5, "correct": "Herkesin İçerik Üretmesi", "wrong": ["E-posta Servisi", "Güvenli İnternet"], "aciklama": "Sadece okumak yetmedi; bloglar ve forumlarla herkes kendi gazetesini yazmaya başladı. Bilgi artık \"yukarıdan\" değil, her yerden geliyordu."}, {"n": 6, "correct": "Sosyal Medya", "wrong": ["Wikipedia", "Google Arama"], "aciklama": "Gutenberg’in bastığı ilk kitaptan, bugün herkesin saniyeler içinde binlerce kişiye seslendiği sosyal medya kaosuna ulaştık."}], "creator": "Önceki"}, {"num": 20, "title": "Buzdolabından Süpermarkete", "meta": "13 Mayıs 2026 | Zorluk: ⭐ | Konu: Yaşam & Teknoloji", "start": "Buzun Doğal Saklanması", "steps": [{"n": 1, "correct": "Elektrikli Buzdolabı", "wrong": ["Isıtma Sistemleri", "Metal Kaplar"], "aciklama": "Eskiden gıdalar karda saklanırdı. Elektrikli buzdolabı gelince mutfaklar mevsimlerden bağımsız bir \"serinliğe\" kavuştu."}, {"n": 2, "correct": "Gıdaların Raf Ömrü", "wrong": ["Mutfak Dekorasyonu", "Elektrik Tüketimi"], "aciklama": "Bozulma derdi bitince, ürünler daha uzaklardan gelebilir hale geldi. \"Hemen tüketmeliyim\" stresi \"dolaba atarım\" rahatlığına dönüştü."}, {"n": 3, "correct": "Büyük Soğuk Depolar", "wrong": ["Yerel Pazarlar", "Ahşap Sandıklar"], "aciklama": "Sadece evde değil, taşımada da soğuk zincir kuruldu. Tonlarca et ve sebze, bozulmadan binlerce kilometre yol katedebildi."}, {"n": 4, "correct": "Dondurulmuş Gıda Devri", "wrong": ["Taze Meyve Modası", "Kurutulmuş Sebze"], "aciklama": "Mevsimi olmayan meyveyi kışın yemek artık bir mucize değildi. Şoklama teknolojisiyle mutfaklarda vakit kazandıran \"hazır yemek\" dönemi başladı."}, {"n": 5, "correct": "Rafların Çeşitlenmesi", "wrong": ["Bakkal Veresiyesi", "Açık Gıda Satışı"], "aciklama": "Binlerce çeşit bozulmayan paketli ürün bir araya gelince, mahalle bakkalı bu çeşitliliğe yetişemez oldu."}, {"n": 6, "correct": "Süpermarketler", "wrong": ["Semt Pazarları", "Organik Çiftlikler"], "aciklama": "Bir zamanlar dağdan kar getiren insanoğlu, bugün dev marketlerin serin rafları arasında her mevsim her şeyi bulabiliyor."}], "creator": "Önceki"}, {"num": 21, "title": "Seri Üretimden Online Alışverişe", "meta": "14 Mayıs 2026 | Zorluk: ⭐ | Konu: Ekonomi & Tüketim", "start": "Ford'un Montaj Hattı", "steps": [{"n": 1, "correct": "Ürünlerin Ucuzlaması", "wrong": ["El İşçiliği Sanatı", "Özel Sipariş Devri"], "aciklama": "Arabalar artık tek tek değil, bant üzerinde seri üretiliyordu. Bu hız, fiyatları düşürdü ve lüks ürünleri herkesin alabileceği hale getirdi."}, {"n": 2, "correct": "Tüketim Toplumu", "wrong": ["Tasarruf Kültürü", "Yerel Üretim"], "aciklama": "Her şey ucuz ve ulaşılabilir olunca, sadece \"ihtiyaç\" için değil, \"istek\" için de satın almaya başladık. Modern alışveriş çılgınlığı doğuyordu."}, {"n": 3, "correct": "Posta-Sipariş Katalogları", "wrong": ["Seyyar Satıcılar", "Panayır Alışverişi"], "aciklama": "Şehir dışındaki insanlar da bu tüketim dalgasına katılmak istiyordu. Kalın sayfalı kataloglar posta kutularına düştü; sipariş mektupla verildi, ürün kapıya kadar geldi."}, {"n": 4, "correct": "Alışveriş Merkezleri", "wrong": ["Küçük Atölyeler", "Elit Mağazalar"], "aciklama": "Kataloglardaki binlerce çeşit ürün, şehir merkezlerinde devasa binalarda fiziksel olarak bir araya geldi. Artık her şeyin tek bir çatı altında bulunduğu \"süper market\" ve \"departmanlı mağaza\" devri başladı."}, {"n": 5, "correct": "Kredi Kartı ve İnternet", "wrong": ["Nakit Ödeme", "Senetli Alışveriş"], "aciklama": "AVM'nin rafları zamanla ekrana taşındı. Kredi kartının güvenli hale gelmesiyle cüzdanlar dijitalleşti; alışveriş yeniden kapıya döndü."}, {"n": 6, "correct": "Bir Tıkla Kapıda", "wrong": ["İkinci El Pazarı", "Takas Yöntemi"], "aciklama": "Ford’un fabrikasındaki banttan çıkan ürünler, bugün dünyanın öbür ucundan tek bir tıkla, kuryeler aracılığıyla kapımıza kadar geliyor."}], "creator": "Önceki"}, {"num": 22, "title": "Kanat Çırpmaktan Dünya Seyahatlerine", "meta": "15 Mayıs 2026 | Zorluk: ⭐ | Konu: Havacılık & Keşif", "start": "Wright Kardeşlerin İlk Uçuşu", "steps": [{"n": 1, "correct": "Pervaneli Uçaklar", "wrong": ["Sıcak Hava Balonu", "Helikopter Kanadı"], "aciklama": "Kitty Hawk'ta 12 saniye süren o ilk uçuş, motorlu havacılığın kapısını araladı. Artık kuşlar gibi uçmak bir hayal değil, mühendislik işiydi."}, {"n": 2, "correct": "Posta ve Kargo Taşımacılığı", "wrong": ["Savaş Stratejileri", "Gökyüzü Reklamları"], "aciklama": "Uçaklar henüz insan taşımak için çok konforsuzdu ama mektupları kıtalar arasında hızla ulaştırmak için mükemmeldiler."}, {"n": 3, "correct": "Yolcu Kabini Tasarımı", "wrong": ["Pilot Kaskı", "Yedek Parça Üretimi"], "aciklama": "Uçakların içine koltuklar eklendi, kabin basıncı çözüldü. İnsanlar artık uçmanın \"korkutucu\" değil, \"havalı\" olduğunu düşünmeye başladı."}, {"n": 4, "correct": "Jet Motorunun İcadı", "wrong": ["Yakıt Tasarrufu", "Hostes Üniforması"], "aciklama": "Pervaneler artık yetmiyordu. Jet motoru sayesinde uçuşlar hızlandı; okyanuslar aşılacak mesafelerden \"saatlik yolculuklara\" dönüştü."}, {"n": 5, "correct": "Ucuz Bilet Akımı", "wrong": ["Özel Jetler", "Birinci Sınıf Menüsü"], "aciklama": "Eskiden sadece zenginlerin işi olan uçmak, havayolu şirketlerinin çoğalmasıyla herkesin ulaşabileceği bir bilet fiyatına indi."}, {"n": 6, "correct": "Küresel Havacılık Ağı", "wrong": ["Uzay Turizmi", "Kağıt Uçak Yarışması"], "aciklama": "Bisiklet tamircisi iki kardeşin kanat bükerek başladığı macera, bugün dünyayı her gün milyonlarca insanın gezdiği dev bir otobana çevirdi."}], "creator": "Önceki"}, {"num": 23, "title": "Gramofondan Kablosuz Kulaklığa", "meta": "16 Mayıs 2026 | Zorluk: ⭐ | Konu: Müzik & Teknoloji", "start": "Gramofonun İcadı", "steps": [{"n": 1, "correct": "Vinil Plaklar", "wrong": ["Radyo Anteni", "Hoparlör Kablosu"], "aciklama": "Müzik artık sadece canlı dinlenen bir şey olmaktan çıktı. Bir iğnenin ucunda, dönen bir plağın üzerine kazınmış sesler evlere girdi."}, {"n": 2, "correct": "Manyetik Kasetler", "wrong": ["Piyano Tuşları", "Kağıt Notalar"], "aciklama": "Plaklar kırılgandı. Kasetlerin gelişiyle müzik hem ucuzladı hem de insanlar kendi seçtikleri şarkıları bir araya getirip \"karışık kaset\" yapabildi."}, {"n": 3, "correct": "Taşınabilir Müzik (Walkman)", "wrong": ["Ev Sineması", "Araba Radyosu"], "aciklama": "Sony Walkman ile müzik hapsolduğu odalardan çıktı. Artık sokakta yürürken, otobüste giderken kendi dünyamızda müzik dinleyebiliyorduk."}, {"n": 4, "correct": "Dijital Ses (CD)", "wrong": ["Analog Yayın", "Sahne Mikrofonu"], "aciklama": "Cızırtılı sesler bitti. CD’ler pürüzsüz ses kalitesi getirdi ama asıl bomba, müziğin fiziksel bir nesneden kurtulup \"dosya\" (MP3) olmasıydı."}, {"n": 5, "correct": "Telefondan Müzik Akışı", "wrong": ["Radyo İstek Hattı", "Albüm Kapakları"], "aciklama": "Binlerce şarkı artık cebimizdeki tek cihaza sığdı. Spotify ve benzeri servislerle \"albüm\" yerini \"çalma listesi\"ne bıraktı; telefon tek başına bir müzik seti oldu."}, {"n": 6, "correct": "Kablosuz Kulaklıklar", "wrong": ["Büyük Hoparlörler", "Müzik Enstrümanları"], "aciklama": "Telefonlardan kulaklık jakı kalkınca kablolar da gereksizleşti. Bugün bir gramofon iğnesinden doğan o ses, kulağımızdaki görünmez cihazlarla tamamen özgür bir deneyime dönüştü."}], "creator": "Önceki"}, {"num": 24, "title": "Klimadan Yaz Tatili Patlamasına", "meta": "17 Mayıs 2026 | Zorluk: ⭐ | Konu: Yaşam & Turizm", "start": "Klimanın İcadı", "steps": [{"n": 1, "correct": "Kapalı Alan Konforu", "wrong": ["Buz Makinesi", "Vantilatör Kanadı"], "aciklama": "Klima aslında matbaalarda kağıtlar nemlenmesin diye icat edilmişti. Ama insanları serinlettiği fark edilince, binaların kaderi değişti."}, {"n": 2, "correct": "Yaşanabilir Sıcak İklim", "wrong": ["Bahçe Mimarisi", "Şehir Surları"], "aciklama": "Temmuz sıcağında içerisi 22 derece ise, dışarının 40 derece olması sorun olmaktan çıktı. Eskiden \"yazları yaşanmaz\" denilen bölgeler birdenbire yaz-kış konforlu hale geldi."}, {"n": 3, "correct": "Sıcak Bölgelere Göç", "wrong": ["Köylere Dönüş", "Soğuk İklim Modası"], "aciklama": "Florida, Antalya, Arizona gibi eskiden sadece kışlık olan yerler, klima sayesinde yıl boyu yaşam merkezlerine dönüştü. İnsanlar kuzeyden güneye akmaya başladı."}, {"n": 4, "correct": "Yaz Turizmi Altyapısı", "wrong": ["Kış Sporları", "Sanayi Tesisleri"], "aciklama": "Serinlik garanti olunca, güneşli kıyılar sadece emekliler için değil, herkes için devasa birer tatil cazibe merkezi oldu."}, {"n": 5, "correct": "Yazlık Ev ve Otel Patlaması", "wrong": ["Şehir Otelleri", "Dağ Evleri"], "aciklama": "Sahil şeritleri otellerle doldu. Klima, güneşin tadını çıkarıp terlemeden uyuyabilmemizi sağlayan o gizli kahramana dönüştü."}, {"n": 6, "correct": "Modern Tatil Kültürü", "wrong": ["Kamp Yapma Merakı", "İş Gezileri"], "aciklama": "Bir matbaa nemlenmesin diye başlayan o \"soğuk hava\" üfleyen motor, bugün milyonlarca insanın yazın tadını çıkardığı dev bir sektörü ayakta tutuyor."}], "creator": "Önceki"}, {"num": 25, "title": "Saray Bahçelerinden Tatil Köylerine", "meta": "18 Mayıs 2026 | Zorluk: ⭐⭐ | Konu: Türkiye & Turizm", "start": "Osmanlı Mesire Kültürü", "steps": [{"n": 1, "correct": "Boğaz’da Yalı Yaşamı", "wrong": ["Saray Ziyafetleri", "Kervansaraylar"], "aciklama": "Osmanlı’da tatil, Kağıthane gibi mesire alanlarında piknik yapmak veya Boğaz’ın serin sularında bir yalıda dinlenmekti."}, {"n": 2, "correct": "İlk Modern Oteller", "wrong": ["Yol Üstü Lokantaları", "Şehir Hamamları"], "aciklama": "Batılılaşma ile beraber Pera Palas gibi dev oteller açıldı. \"Evde kalmak\" yerini \"konaklama hizmeti almaya\" bırakmaya başladı."}, {"n": 3, "correct": "Turizm Teşvikleri", "wrong": ["Gümrük Yasaları", "Tarım Reformu"], "aciklama": "Türkiye, muhteşem kıyılarını dünyaya tanıtmak istedi. 1980’lerde yapılan hamlelerle sahillerimiz dünya haritasına eklendi."}, {"n": 4, "correct": "Paket Tatil Sistemi", "wrong": ["Bireysel Gezi", "Kamp Çadırı"], "aciklama": "\"Her şey dahil\" fikriyle turistlerin önüne bir dünya sunuldu. Uçak, otel ve yemek tek fiyata inince kapılar herkese açıldı."}, {"n": 5, "correct": "Bodrum ve Antalya’nın Yükselişi", "wrong": ["İstanbul Tarih Gezisi", "Karadeniz Yaylaları"], "aciklama": "Ege ve Akdeniz kıyıları, küçük balıkçı kasabalarından dünyanın en büyük tatil destinasyonlarına evrildi."}, {"n": 6, "correct": "Kitlesel Turizm", "wrong": ["Doğa Yürüyüşleri", "Müze Kart Sistemi"], "aciklama": "Osmanlı'nın gümüş tepsili mesire eğlenceleri, bugün Antalya kıyılarında binlerce kişiye aynı anda hizmet veren dev tatil köylerine dönüştü."}], "creator": "Önceki"}, {"num": 26, "title": "Ansiklopediden Yapay Zekaya", "meta": "20 Mayıs 2026 | Zorluk: ⭐⭐ | Konu: Bilgi & Gelecek", "start": "Ciltli Ansiklopediler", "steps": [{"n": 1, "correct": "Alfabetik Bilgi Arayışı", "wrong": ["Roman Okuma", "Sözlük Karıştırma"], "aciklama": "Eskiden bilgiye ulaşmak için kütüphane kütüphane gezilir veya evdeki 30 ciltlik ansiklopedinin \"B\" harfi açılıp sayfalar çevrilirdi."}, {"n": 2, "correct": "Arama Motorları", "wrong": ["Favori Siteler", "Tarayıcı Geçmişi"], "aciklama": "Bilgi çok fazlaydı. \"Google'lamak\" diye bir fiil doğdu. Neyi aradığımızı bildiğimiz sürece her şey saniyeler içindeydi."}, {"n": 3, "correct": "Kullanıcı Üretimi İçerik", "wrong": ["Blog Yazarlığı", "Haber Siteleri"], "aciklama": "Bilgi artık sadece tüketilmiyor, üretiliyordu. Wikipedia'dan YouTube'a, forumlardan sosyal medyaya milyarlarca insan aynı anda içerik yazıp paylaşmaya başladı."}, {"n": 4, "correct": "Büyük Veri", "wrong": ["Bulut Depolama", "Veri Güvenliği"], "aciklama": "Bu devasa içerik yığını bir noktadan sonra insan aklının okuyabileceğinden çok daha büyüktü. Her tıklama, her yorum, her fotoğraf; işlenmeyi bekleyen bir veri havuzuna akıyordu."}, {"n": 5, "correct": "Makine Öğrenmesi", "wrong": ["Programlama Dilleri", "Donanım Güncellemesi"], "aciklama": "Bilgisayarlar artık sadece kendilerine verileni yapmıyor, bu devasa veriyi inceleyerek \"öğrenmeye\" başlıyordu."}, {"n": 6, "correct": "Yapay Zeka Asistanları", "wrong": ["Akıllı Saatler", "Dijital Takvim"], "aciklama": "Artık sayfaları çevirmemize veya arama motorunda boğulmamıza gerek yok. Soruyoruz ve bizim için tüm bilgiyi sentezleyen bir zeka bize cevap veriyor."}], "creator": "Önceki"}, {"num": 27, "title": "Baruttan Dinamite: Gücün Kontrolü", "meta": "21 Mayıs 2026 | Zorluk: ⭐⭐ | Konu: Teknoloji & Tarih", "start": "Çin’de Barutun İcadı", "steps": [{"n": 1, "correct": "İpek Yolu ile Batı Ticareti", "wrong": ["Roma İmparatorluğu'na Hediye", "Büyük İskender'in Seferleri"], "aciklama": "Çinli simyacıların \"ölümsüzlük iksirini\" ararken buldukları barut, kervanlarla önce Orta Doğu’ya, oradan da Avrupa’ya ulaştı."}, {"n": 2, "correct": "Ateşli Silahlar Devri", "wrong": ["Şövalye Turnuvaları", "Kale Duvarlarının Kalınlaşması"], "aciklama": "Barut, savaşın kurallarını kökten değiştirdi. Artık ok ve yayın yerini gürültülü ve yıkıcı toplar, tüfekler almaya başladı."}, {"n": 3, "correct": "Madencilikte Patlamalar", "wrong": ["Kimya Laboratuvarları", "Demir-Çelik Fabrikaları"], "aciklama": "Savaş alanından çıkan barut, dağları delip madenlere ulaşmak için de kullanılmaya başlandı ama kontrol edilmesi hala çok zordu."}, {"n": 4, "correct": "Alfred Nobel ve Nitrogliserin", "wrong": ["Barutun Yasaklanması", "İlk Dinamit Fabrikası"], "aciklama": "Alfred Nobel, çok tehlikeli olan nitrogliserini daha güvenli hale getirmenin yollarını aradı. Bir kaza, ona büyük bir keşif yaptıracaktı."}, {"n": 5, "correct": "Dinamitin Patenti", "wrong": ["Nobel Barış Ödülü", "TNT’nin Keşfi"], "aciklama": "Nobel, patlayıcıyı kontrol altına alıp \"dinamit\" adıyla tescilledi. Artık inşaatlar ve kazılar çok daha hızlı ilerleyebiliyordu."}, {"n": 6, "correct": "Küresel Altyapı Devrimi", "wrong": ["Barutun Tarihten Silinmesi", "Modern Ordu Yapısı"], "aciklama": "Dinamit sayesinde dev tüneller açıldı, kanallar kazıldı. Bir simyacının barutuyla başlayan yolculuk, dünyayı yeniden inşa eden dev bir güce dönüştü."}], "creator": "Önceki"}, {"num": 28, "title": "Antik Roma Atlarından Uzay Mekiğine", "meta": "22 Mayıs 2026 | Zorluk: ⭐ | Konu: Teknoloji & Standartlar", "start": "Roma Savaş Arabaları", "steps": [{"n": 1, "correct": "Standart Tekerlek Aralığı", "wrong": ["At Nalı İcadı", "Taş Döşeli Yollar"], "aciklama": "Romalılar, savaş arabalarını iki atın yan yana sığacağı genişlikte yaptı. Yolların üzerindeki tekerlek izleri bu ölçüye göre şekillendi."}, {"n": 2, "correct": "İlk Atlı Raylı Sistemler", "wrong": ["Lokomotif Motoru", "Maden Vagonları"], "aciklama": "Yüzyıllar sonra ilk raylar döşenirken, mevcut yollardaki tekerlek izleri baz alındı. Yani atların genişliği, rayların genişliğini belirledi."}, {"n": 3, "correct": "Modern Tren Rayları", "wrong": ["Buharlı Gemi Hattı", "Metro Tünelleri"], "aciklama": "İngiltere'de tren rayları döşenirken, eski vagonların ölçüleri korundu. \"Standart ray aralığı\" tüm dünyaya bu şekilde yayıldı."}, {"n": 4, "correct": "Tünellerin Genişliği", "wrong": ["İstasyon Tasarımları", "Hızlı Tren Teknolojisi"], "aciklama": "Raylar belli bir genişlikte olunca, o raylardan geçen trenlerin ve tünellerin genişliği de antik Roma arabalarına göre ayarlanmış oldu."}, {"n": 5, "correct": "Uzay Mekiği Yakıt Tankları", "wrong": ["Uçak Kanatları", "Gemi Gövdeleri"], "aciklama": "Uzay mekiğinin dev yakıt tankları trenle taşınmak zorundaydı. Tanklar, geçecekleri tünellere sığabilmesi için tren raylarının genişliğine göre tasarlandı."}, {"n": 6, "correct": "Teknolojik Süreklilik", "wrong": ["Uzay Çağı Başlangıcı", "Modern Mühendislik"], "aciklama": "İnanması güç ama bugün uzaya çıkan teknolojinin genişliğini, aslında 2000 yıl önce yan yana yürüyen iki Roma atının genişliği belirledi."}], "creator": "Önceki"}, {"num": 29, "title": "Dokuma Tezgahından Dünya Vitrinine 🇹🇷", "meta": "23 Mayıs 2026 | Zorluk: ⭐ | Konu: Türkiye & Ekonomi", "start": "Yerel El Dokumaları", "steps": [{"n": 1, "correct": "İlk Tekstil Fabrikaları", "wrong": ["İpek Böcekçiliği", "Halı Pazarları"], "aciklama": "Anadolu’daki el tezgahları, sanayileşme ile birlikte yerini dev fabrikalara bıraktı. Pamuk artık sadece iplik değil, büyük bir sanayi koluydu."}, {"n": 2, "correct": "İhracat Odaklı Üretim", "wrong": ["Yerel Giyim Modası", "Kumaş İthalatı"], "aciklama": "1980'lerden sonra Türkiye sadece kendi ihtiyacını dikmekle kalmadı; dünyaya kumaş ve kıyafet satmaya karar verdi."}, {"n": 3, "correct": "Denim ve Kot Üretimi", "wrong": ["Suni Deri Modası", "İpekli Kumaşlar"], "aciklama": "Türkiye, dünyadaki en kaliteli denim (kot) kumaş üreticilerinden biri haline geldi. Dev markalar kumaşlarını buradan almaya başladı."}, {"n": 4, "correct": "Avrupa’nın Hazır Giyim Deposu", "wrong": ["Asya ile Rekabet", "Moda Haftaları"], "aciklama": "Coğrafi yakınlık avantajıyla, Avrupa’daki büyük mağaza zincirlerinin en büyük tedarikçisi \"Made in Türkiye\" etiketli ürünler oldu."}, {"n": 5, "correct": "Kendi Markalarımızı Yaratmak", "wrong": ["Fason Üretim Devri", "Online Satış Kanalları"], "aciklama": "Sadece başkasına dikmek yetmedi; Türkiye kendi global markalarını kurarak mağazalarını dünyanın dört bir yanına açtı."}, {"n": 6, "correct": "Küresel Moda Oyuncusu", "wrong": ["Tekstil Mühendisliği", "Alışveriş Festivali"], "aciklama": "Bir köydeki küçük dokuma tezgahından başlayan serüven, bugün dünyanın her yerindeki gardıroplarda yer bulan dev bir moda gücüne dönüştü."}], "creator": "Önceki"}, {"num": 30, "title": "Marka Algısından Algı Yönetimine", "meta": "24 Mayıs 2026 | Zorluk: ⭐⭐ | Konu: Pazarlama & Psikoloji", "start": "Ürün Odaklı Satış", "steps": [{"n": 1, "correct": "Modern Reklamcılığın Doğuşu", "wrong": ["Gazete İlanları", "İlk Logo Tasarımı"], "aciklama": "Eskiden sadece \"bu ürün kalitelidir\" denirdi. Modern reklamcılıkla birlikte, ürünün sadece kalitesi değil, hissettirdiği duygu satılmaya başlandı."}, {"n": 2, "correct": "Duygusal Pazarlama", "wrong": ["Fiyat İndirimleri", "Ücretsiz Numuneler"], "aciklama": "Reklamcılar, insanların mantığına değil duygularına hitap etmeyi keşfetti. \"Bu arabayı alırsan güçlü hissedersin\" mesajı, motor gücünden daha önemli oldu."}, {"n": 3, "correct": "Marka Bağlılığı Oluşturma", "wrong": ["Radyo Spotları", "Anket Çalışmaları"], "aciklama": "İnsanların bir markayı sadece ihtiyacı olduğu için değil, o markanın bir parçası olmak istedikleri için alması sağlandı."}, {"n": 4, "correct": "Televizyon Reklamları", "wrong": ["Bilboard Panoları", "Sponsorluk Anlaşmaları"], "aciklama": "Televizyonun eve girmesiyle markalar karakter kazandı. Şarkılar, sloganlar ve renkler zihinlerimize kazınmaya başladı."}, {"n": 5, "correct": "Influencer ve Deneyim", "wrong": ["Kapıdan Satış", "Katalog Alışverişi"], "aciklama": "Bugün artık reklamları sadece izlemiyoruz; güvendiğimiz insanların tavsiyeleriyle o hayat tarzını satın alıyoruz."}, {"n": 6, "correct": "Modern Yaşam Tarzı Satışı", "wrong": ["Dijital Veri Toplama", "Satış Temsilciliği"], "aciklama": "Pazarlama artık bir ürün satmak değil, bir \"hikaye\" anlatmak haline geldi. Hepimiz o hikayenin birer parçasıyız."}], "creator": "Önceki"}, {"num": 31, "title": "Meydan Oyunundan Stand-up’a 🇹🇷", "meta": "25 Mayıs 2026 | Zorluk: ⭐ | Konu: Türkiye & Mizah", "start": "Ortaoyunu ve Kavuklu", "steps": [{"n": 1, "correct": "Meydan Eğlenceleri", "wrong": ["Saray Tiyatrosu", "Kukla Gösterileri"], "aciklama": "Geleneksel Türk tiyatrosu sokaktaydı. Kavuklu ve Pişekar, metinsiz ve tamamen doğaçlama şekilde halkı meydanlarda güldürürdü."}, {"n": 2, "correct": "Tuluat Tiyatrosu", "wrong": ["İlk Sinema Salonu", "Opera Binası"], "aciklama": "Meydandaki o doğaçlama ruhu sahneye taşındı. Yazılı metin olmasa da oyuncuların kıvrak zekası izleyiciyi mest ediyordu."}, {"n": 3, "correct": "Yeşilçam’ın Komedi Ustaları", "wrong": ["Radyo Skeçleri", "Klasik Tiyatro Oyunları"], "aciklama": "Tuluat geleneği sinemaya geçti. Kemal Sunal ve Şener Şen gibi ustalar, halkın içinden gelen karakterleri \"doğal\" bir komediyle devleştirdi."}, {"n": 4, "correct": "Mizah Dergileri Dönemi", "wrong": ["Gazete Köşeleri", "Karikatür Kursları"], "aciklama": "Gırgır gibi dergilerle mizah kağıda döküldü. Sokaktaki dil, çizgilerle birleşti ve yeni bir espri anlayışı doğdu."}, {"n": 5, "correct": "Stand-up Gösterileri", "wrong": ["Sitcom Dizileri", "Talk Show Programları"], "aciklama": "90'larda mizah tekrar \"tek bir kişinin\" sahnedeki zekasına döndü. Cem Yılmaz gibi isimler, anlatı geleneğini modern bir formata taşıdı."}, {"n": 6, "correct": "Dijital Mizah Çağı", "wrong": ["Tiyatro Festivalleri", "Televizyon Yarışmaları"], "aciklama": "Meydandaki Kavuklu'nun hikayeleri, bugün internetteki kısa videolar ve dev sahnelerdeki gösterilerle binlerce yıldır devam eden o eşsiz gülme ihtiyacımızı karşılıyor."}], "creator": "Önceki"}, {"num": 32, "title": "Kara Veba'dan Modern İşçi Haklarına", "meta": "Zorluk: ⭐⭐⭐ | Konu: Tarih & Ekonomi", "start": "1347 Kara Veba Salgını", "steps": [{"n": 1, "correct": "Tarımsal İş Gücü Kıtlığı", "wrong": ["Tıp Biliminin Gelişimi", "Şehirlerin Terk Edilmesi"], "aciklama": "Veba nüfusun üçte birini yok edince, hayatta kalan köylüler \"nadir bulunan bir değer\" haline geldi. Bu durum, feodal sistemin pazarlık gücünü köylü lehine değiştirdi."}, {"n": 2, "correct": "Serfliğin Çöküşü ve Ücretli Emek", "wrong": ["Yeni Tarım Aletleri", "Kilise Otoritesinin Artışı"], "aciklama": "Köylüler artık toprağa bağlı köleler (serf) olmayı reddedip emeklerini para karşılığı satmaya başladılar. Modern \"işçi\" kavramının ilk kıvılcımı burada çaktı."}, {"n": 3, "correct": "Sanayi Devrimi ve Fabrika Sistemi", "wrong": ["Coğrafi Keşifler", "Matbaanın İcadı"], "aciklama": "Üretim tarladan fabrikaya taşındı. Binlerce insan aynı çatı altında, aynı saatlerde çalışmaya başladı. Bu yoğunlaşma, ortak sorunların fark edilmesini sağladı."}, {"n": 4, "correct": "Sendikalaşma ve Kolektif Pazarlık", "wrong": ["Şehirleşme Oranları", "Buharlı Lokomotifler"], "aciklama": "Tek başına güçsüz olan işçiler, birleşerek işverenle masaya oturdu. Günde 16 saat çalışma ve çocuk işçiliği gibi konulara karşı ilk büyük direnişler başladı."}, {"n": 5, "correct": "Standart Çalışma Saati Yasaları", "wrong": ["Asgari Ücret Belirlenmesi", "Fabrika Güvenlik Kameraları"], "aciklama": "Uzun mücadeleler sonucu \"8 saat çalışma, 8 saat eğlence, 8 saat dinlenme\" kuralı birçok ülkede yasal bir standart haline geldi."}, {"n": 6, "correct": "Modern Ücretli İzin ve Sosyal Güvenlik", "wrong": ["Hafta Sonu Tatili", "Emeklilik Yaşı Tartışmaları"], "aciklama": "Bugün işçi hakları sadece maaş değil; dinlenme, sağlık ve gelecek güvencesini de kapsıyor. Kara Veba ile başlayan nüfus krizi, yüzyıllar sonra insan onuruna yakışır bir çalışma düzenine evrildi."}], "creator": "Önceki"}, {"num": 33, "title": "Dijital Gizlilik ve Snowden'ın Keşfi", "meta": "27 Mayıs 2026 | Zorluk: ⭐⭐ | Konu: Siyaset & Dijital Haklar", "start": "11 Eylül Sonrası Yeni Güvenlik", "steps": [{"n": 1, "correct": "Patriot Act Yasası", "wrong": ["Sınır Güvenliği", "Havaalanı Kontrolleri"], "aciklama": "2001'deki olaylardan sadece 45 gün sonra, dijital izlemenin kapısını sonuna kadar açan 362 sayfalık devasa bir yasa imzalandı."}, {"n": 2, "correct": "Stellar Wind Programı", "wrong": ["Gizli Ajan Takibi", "Uydu Görüntüleri"], "aciklama": "NSA, mahkeme kararı olmadan telefonları ve e-postaları izlemeye başladı. Bu devasa veri toplama ağına \"Stellar Wind\" adı verildi."}, {"n": 3, "correct": "FISA Gizli Mahkemeleri", "wrong": ["Adalet Bakanlığı", "Meclis Denetimi"], "aciklama": "İzlemeler için gizli mahkemelerden onay alındı. Teknoloji devlerine \"verileri paylaşın\" diyen gizli emirler gönderildi."}, {"n": 4, "correct": "PRISM Sistemi", "wrong": ["Siber Ordu", "Bulut Depolama"], "aciklama": "2007'de başlayan PRISM ile istihbarat servisleri; Microsoft, Google ve Apple gibi dev şirketlerden gizli yasal süreçlerle veri topladı."}, {"n": 5, "correct": "Edward Snowden İfşaatı", "wrong": ["WikiLeaks Sızıntısı", "Basın Toplantısı"], "aciklama": "Bir NSA müteahhidi olan Snowden, 1.7 milyon belgeyi kopyalayıp dünyayı şoke eden o meşhur haberi Guardian'a sızdırdı."}, {"n": 6, "correct": "Gözetim Toplumu", "wrong": ["İnternet Yasakları", "Yeni Veri Merkezi"], "aciklama": "Snowden sonrası dünya artık verinin ne kadar güçlü bir silah olduğunu biliyor. Bugün cebimizdeki her cihaz, bu gözetim ağının bir parçası."}], "creator": "Önceki"}, {"num": 34, "title": "Bosman'dan 222 Milyon Euro'ya", "meta": "28 Mayıs 2026 | Zorluk: ⭐⭐ | Konu: Spor & Ekonomi", "start": "Jean-Marc Bosman Davası", "steps": [{"n": 1, "correct": "Serbest Transfer Hakkı", "wrong": ["Futbolcu Maaşları", "Yabancı Sınırı"], "aciklama": "1990'da takımdan ayrılmak isteyen Bosman, kulübünün engelini aşmak için dava açtı. 1995'te mahkeme dedi ki: \"Sözleşmesi biten oyuncu özgürdür\"."}, {"n": 2, "correct": "Oyuncu Pazarlık Gücü", "wrong": ["Stat Sponsorlukları", "Yayın Hakları"], "aciklama": "Sözleşmesi biten oyuncu artık bedavaya gidebiliyordu. Kulüpler yıldızlarını kaçırmamak için maaşları ve imza paralarını yükseltmek zorunda kaldı."}, {"n": 3, "correct": "Ronaldo'nun Real Madrid Rekoru", "wrong": ["Beckham'ın Real Madrid Transferi", "Zidane'ın Juventus'tan Ayrılışı"], "aciklama": "Artan bütçelerle rekorlar gelmeye başladı. 2009'da Cristiano Ronaldo 94 milyon euro'ya Real Madrid'e geçerek yeni bir çağ açtı."}, {"n": 4, "correct": "Financial Fair Play", "wrong": ["Vergi Denetimi", "Kulüp Lisansları"], "aciklama": "UEFA, bu harcama çılgınlığını durdurmak için \"kazandığın kadar harca\" kuralını (FFP) getirdi ama durdurmak pek mümkün olmadı."}, {"n": 5, "correct": "Neymar'ın PSG Transferi", "wrong": ["Mbappe'nin Yükselişi", "Messi'nin Ayrılığı"], "aciklama": "PSG, FFP'nin tüm sınırlarını zorladı ve 2017'de 222 milyon euroya Neymar'ı alarak tarihin en pahalı transferini gerçekleştirdi."}, {"n": 6, "correct": "Modern Transfer Piyasası", "wrong": ["Avrupa Süper Ligi", "Küresel Yayıncılık"], "aciklama": "Bugün toplam transfer harcaması yıllık 6 milyar euroyu aşıyor. Bosman o davayı kazanmasa, bu rakamlar sadece hayal olabilirdi."}], "creator": "Önceki"}, {"num": 35, "title": "Lego'dan GitHub'a", "meta": "29 Mayıs 2026 | Zorluk: ⭐⭐⭐ | Konu: Tasarım & Yazılım", "start": "Lego Tuğlası Patenti (1958)", "steps": [{"n": 1, "correct": "Modüler Tasarım Felsefesi", "wrong": ["Plastik Oyuncak Endüstrisi", "Danimarka Tasarım Okulu"], "aciklama": "1958'de tescillenen kilit sistemi, bağımsız parçaların birleşerek karmaşık bütünler oluşturmasını mümkün kıldı. Bu yaklaşım bir tasarım prensibi olarak kayıtlara geçti."}, {"n": 2, "correct": "Bell Labs Araştırmaları", "wrong": ["Bauhaus Mimarisi", "Otomotiv Üretim Hattı"], "aciklama": "1960'larda Bell Labs mühendisleri, karmaşık sistemleri küçük ve bağımsız bileşenlere ayırarak modern yazılımın altyapısını kurdu."}, {"n": 3, "correct": "UNIX İşletim Sistemi", "wrong": ["C Programlama Dili", "Transistör"], "aciklama": "1969'da Thompson ve Ritchie'nin \"küçük programlar tek iş yapsın\" felsefesiyle geliştirdiği bu sistem, yazılım dünyasına hızla yayıldı."}, {"n": 4, "correct": "GNU Projesi", "wrong": ["Microsoft Windows", "Apple Macintosh"], "aciklama": "1983'te Richard Stallman, UNIX uyumlu ama herkesin geliştirebileceği bir sistem yaratma hedefiyle bir proje başlattı. Hareketin temel ilkesi paylaşıma açıklıktı."}, {"n": 5, "correct": "Linux Çekirdeği", "wrong": ["Mozilla Tarayıcısı", "Android Sistemi"], "aciklama": "1991'de Linus Torvalds adlı bir öğrenci, GNU'nun eksik kalan teknik bileşenini yazıp internete açtı. İkisi birleşince tam bir sistem ortaya çıktı."}, {"n": 6, "correct": "GitHub", "wrong": ["Sosyal Medya Platformları", "Bulut Depolama Hizmetleri"], "aciklama": "Torvalds'ın Linux'u daha rahat geliştirmek için yarattığı kod yönetim sistemi (Git), 2008'de GitHub'ın kurulmasıyla küresel bir işbirliği platformuna dönüştü."}], "creator": "Önceki"}, {"num": 36, "title": "Napolyon'dan Amazon'a", "meta": "30 Mayıs 2026 | Zorluk: ⭐⭐ | Konu: Tarih & Teknoloji", "start": "Napolyon'un Lojistik Sorunu", "steps": [{"n": 1, "correct": "Nicolas Appert'in Konservesi", "wrong": ["Askeri Telgraf", "Posta Arabaları"], "aciklama": "Napolyon, \"Ordu midesiyle yürür\" dedi ve gıda saklamaya ödül koydu. 1810'da Appert'in icat ettiği konserve, lojistiği sonsuza dek değiştirdi."}, {"n": 2, "correct": "Barkodun İcadı", "wrong": ["Soğuk Zincir", "Market Rafı"], "aciklama": "Ürünler bozulmadan depolanabilir hale gelince stok miktarları patladı. Binlerce farklı ürünü takip etmek için yeni bir sisteme ihtiyaç vardı.\""}, {"n": 3, "correct": "Walmart'ın Barkod Devrimi", "wrong": ["İlk Online Satış", "Kasiyer Eğitimi"], "aciklama": "Walmart, 1980'lerde tüm ürünlerini barkodla takip etmeye başladı. Barkod sadece bir etiket değil, en büyük stratejik silaha dönüştü."}, {"n": 4, "correct": "Dünyanın En Büyük Veri Ambarı", "wrong": ["Küresel Mağazalar", "Ucuzluk Kampanyası"], "aciklama": "Walmart 90'larda her gün milyonlarca işlemi tek bir veri ambarında topladı. Hangi ürünün ne zaman, nerede, kiminle birlikte satıldığı artık ölçülebiliyordu."}, {"n": 5, "correct": "Amazon'un Kişiselleştirme Silahı", "wrong": ["Kitap Satışları", "Hızlı Teslimat"], "aciklama": "Bezos, Walmart'ın verisinden ders aldı. \"Bunu alanlar şunu da aldı\" algoritmasıyla Amazon'u sadece bir mağaza değil, bir veri devi yaptı."}, {"n": 6, "correct": "Big Data (Büyük Veri)", "wrong": ["Bulut Bilişim", "Robotik Depolar"], "aciklama": "Napolyon'un askerlerini doyurma çabasıyla başlayan süreç, bugün 324 milyar dolarlık \"Big Data\" endüstrisini ve bizi tanıyan algoritmaları doğurdu."}], "creator": "Önceki"}, {"num": 37, "title": "Pamuk'tan Hollywood'a", "meta": "31 Mayıs 2026 | Zorluk: ⭐⭐ | Konu: Kültür & Sinema", "start": "Pamuk Tarlaları", "steps": [{"n": 1, "correct": "Nitroselüloz (Pamuk Barutu)", "wrong": ["Dokuma Sanayii", "Buharlı Çırçır"], "aciklama": "Pamuk lifleri saf selülozdur. 1845'te bu lifler asitle işlenince \"nitroselüloz\" doğdu. Hem patlayıcıydı hem de şeffaf ve esnekti."}, {"n": 2, "correct": "Hyatt'ın Selüloidi", "wrong": ["İlk Plastik Bardak", "Sentetik Boya"], "aciklama": "1869'da bu madde \"Selüloid\"e, yani tarihin ilk ticari plastiğine dönüştü. Artık elimizde şekil verilebilen, şeffaf bir malzeme vardı."}, {"n": 3, "correct": "Eastman'ın Rulo Filmi", "wrong": ["Kutulu Kamera", "Renkli Resim"], "aciklama": "George Eastman, selüloidi ince şeritler haline getirip rulo film yaptı. Artık fotoğraf çekmek için ağır cam plakalar gerekmiyordu."}, {"n": 4, "correct": "Lumiere Kardeşlerin Sineması", "wrong": ["Edison'un Merceği", "İlk Çizgi Film"], "aciklama": "1895'te Paris'te ilk halka açık gösterim yapıldı. Görüntü artık sadece durmuyor, o rulo film sayesinde perdede hareket ediyordu."}, {"n": 5, "correct": "Edison'un Patent Savaşları", "wrong": ["İlk Sesli Film", "Sinema Salonları"], "aciklama": "Thomas Edison, film ekipmanlarının patentini almıştı ve yapımcılardan para istiyordu. Bağımsızlar, Edison'un avukatlarından kaçmaya başladı."}, {"n": 6, "correct": "Hollywood'un Kuruluşu", "wrong": ["Los Angeles Limanı", "Western Filmleri"], "aciklama": "Yapımcılar patent baskısından uzaklaşmak için California’ya yöneldi; güneşli iklim, ucuz arazi ve çeşitli doğal mekanlarla Hollywood cazibe merkezi oldu."}], "creator": "Önceki"}, {"num": 38, "title": "Çernobil'den Güneş Enerjisine", "meta": "1 Haziran 2026 | Zorluk: ⭐⭐ | Konu: Enerji & Çevre", "start": "Çernobil Felaketi", "steps": [{"n": 1, "correct": "Nükleer Karşıtı Hareket", "wrong": ["Tahliye Operasyonu", "Yeni Güvenlik Kuralları"], "aciklama": "1986'daki patlama sonrası Avrupa'da, özellikle Almanya'da nükleer enerjiye karşı dev bir toplumsal muhalefet dalgası başladı."}, {"n": 2, "correct": "Energiewende Politikası", "wrong": ["Karbon Vergisi", "Atık Yönetimi"], "aciklama": "Almanya, 2000'de \"Enerji Dönüşümü\" yasasını çıkardı. Amacı nükleerden ve kömürden kurtulup yenilenebilir enerjiye geçmekti."}, {"n": 3, "correct": "Güneş Paneli Teşvikleri", "wrong": ["Rüzgar Türbinleri", "Tasarruflu Ampuller"], "aciklama": "Alman hükümeti, çatısına güneş paneli koyanlara 20 yıl boyunca alım garantisi verdi. Bu, küresel bir talep patlaması yarattı."}, {"n": 4, "correct": "Çin'in Üretim Ölçeği", "wrong": ["Amerikan Ar-Ge'si", "Japon Teknolojisi"], "aciklama": "Almanların yarattığı bu dev talebi Çinli üreticiler gördü. Devasa fabrikalar kurarak üretimi ölçeklendirdiler ve dünyaya yaydılar."}, {"n": 5, "correct": "%95 Maliyet Düşüşü", "wrong": ["Yeni Panel Tasarımı", "Batarya Gelişimi"], "aciklama": "Seri üretim sayesinde güneş panelinin maliyeti 10 yılda serbest düşüşe geçti. 2010'da watt başına 2 dolar olan modüller, 2023'te 30 sentin altına indi."}, {"n": 6, "correct": "Güneş Enerjisi Devrimi", "wrong": ["Paris Anlaşması", "Elektrikli Araçlar"], "aciklama": "Bugün güneş, dünyanın en ucuz enerji kaynağı. Bir nükleer felaket, yenilenebilir enerjiye geçişi hızlandıran zincirin ilk halkasıydı."}], "creator": "Önceki"}, {"num": 39, "title": "Balina'dan Plastik Krizine", "meta": "2 Haziran 2026 | Zorluk: ⭐⭐ | Konu: Çevre & Sanayi", "start": "Balina Avı Dönemi", "steps": [{"n": 1, "correct": "Balina Yağı Kıtlığı", "wrong": ["Deniz Ticareti", "Yeni Gemiler"], "aciklama": "1850'lerde sokaklar balina yağıyla aydınlanıyordu. Ancak balinalar tükenince yağ çok pahalılaştı; dünya yeni bir yakıt arayışına girdi."}, {"n": 2, "correct": "İlk Petrol Kuyusu", "wrong": ["Kömür Madenleri", "Buharlı Tren"], "aciklama": "Edwin Drake 1859'da petrolü bulunca, balina yağının yerini \"gazyağı\" aldı. Daha ucuz ve daha parlaktı; balinalar ise (şimdilik) kurtuldu."}, {"n": 3, "correct": "Doğal Reçine Kıtlığı", "wrong": ["New York Borsası", "İlk Otomobiller"], "aciklama": "Sanayi yeni bir darboğazla karşılaştı: kabloları yalıtmakta kullanılan şellak böceklerden elde ediliyordu ve talebe yetişemiyordu."}, {"n": 4, "correct": "Baekeland'ın Bakeliti", "wrong": ["Vulkanize Kauçuk", "Selüloit Film"], "aciklama": "Leo Baekeland, 1907'de fenol ve formaldehiti birleştirerek dünyanın ilk tamamen sentetik malzemesini üretti. Bakelit, doğadaki hiçbir maddeye dayanmayan ilk plastikti."}, {"n": 5, "correct": "Kullan-At Kültürü", "wrong": ["Geri Dönüşüm Kutusu", "Plastik Oyuncaklar"], "aciklama": "1950'lerde plastik o kadar ucuzladı ki, \"kullan-at\" kültürü pazarlandı. Artık yıkamak yerine çöpe atmak modernlik sayılıyordu."}, {"n": 6, "correct": "Büyük Pasifik Çöp Yığını", "wrong": ["Atık Vergisi", "Mikroplastikler"], "aciklama": "Balinaları kurtarmak için başlayan zincir, okyanusta Fransa'nın üç katı büyüklüğünde bir plastik yığınında son buldu. Yığın bugün 1.8 trilyon parça içeriyor."}], "creator": "Önceki"}, {"num": 40, "title": "Plastik Ördeklerden AB Yasağına", "meta": "3 Haziran 2026 | Zorluk: ⭐⭐⭐ | Konu: Çevre & Hukuk", "start": "Ever Laurel Gemi Kazası", "steps": [{"n": 1, "correct": "28.800 Oyuncak Ördeğin Firarı", "wrong": ["Gemi Güvenliği", "Fırtına Uyarısı"], "aciklama": "1992'de Pasifik'te bir konteyner denize düştü ve içindeki binlerce sarı plastik ördek okyanusa yayıldı."}, {"n": 2, "correct": "Ördeklerin Bilimsel Takibi", "wrong": ["Sahil Temizliği", "Hayvan Hakları"], "aciklama": "Bilim insanları bu ördekleri takip ederek okyanus akıntılarının dünya turunu haritaladı. Oyuncaklar, okyanusun nabzını ölçen birer araca dönüştü."}, {"n": 3, "correct": "Akıntı Haritalarının Çıkarılması", "wrong": ["Yeni Radar Sistemi", "Deniz Biyolojisi"], "aciklama": "Ördekler yıllarca yüzdü; bazıları buzullara ulaştı. Bu veriler okyanuslardaki gizli \"çöp toplama merkezlerini\" de ifşa etti."}, {"n": 4, "correct": "Kaptan Moore'un Çöp Keşfi", "wrong": ["Sualtı Fotoğrafları", "Greenpeace Raporu"], "aciklama": "1997'de bir yat kaptanı, ördeklerin gittiği yolları izlerken devasa bir plastik yığınının içinde hapsolduğunu fark etti."}, {"n": 5, "correct": "Döngüsel Ekonomi Raporu", "wrong": ["Çevre Vergileri", "Yeni Plastik Türü"], "aciklama": "Raporlar korkutucuydu: \"2050'de denizde balıktan çok plastik olacak.\" Bu farkındalık, plastik üretiminin temelini sorgulattı."}, {"n": 6, "correct": "AB Tek Kullanımlık Plastik Yasağı", "wrong": ["Okyanus Temizleme", "Kağıt Pipetler"], "aciklama": "2021'de AB; tek kullanımlık plastikleri yasakladı. Bu yasanın yolu, yıllar önce okyanusta yüzen birkaç sarı oyuncak ördekten geçiyordu."}], "creator": "Önceki"}, {"num": 41, "title": "Fotoğraftan Kamuoyuna", "meta": "4 Haziran 2026 | Zorluk: ⭐⭐ | Konu: Gazetecilik & Tarih", "start": "Daguerre'in İlk Fotoğrafı", "steps": [{"n": 1, "correct": "İlk Savaş Fotoğrafları", "wrong": ["Aile Albümleri", "Manzara Resimleri"], "aciklama": "1839'da fotoğraf icat edildi. Sadece 16 yıl sonra Roger Fenton, Kırım Savaşı'na giderek cepheden ilk görüntüleri dünyaya gönderdi."}, {"n": 2, "correct": "Sansürsüz Gerçeklik", "wrong": ["Gazete Çizimleri", "Ordu Raporları"], "aciklama": "Mathew Brady, Amerikan İç Savaşı'nda ölüleri ve yaralıları fotoğrafladı. İnsanlar ilk kez savaşın \"romantik\" değil, korkunç yüzüyle yüzleşti."}, {"n": 3, "correct": "Sosyal Değişim ve Reform", "wrong": ["Sarı Gazetecilik", "Fotoğraf Ajansları"], "aciklama": "Jacob Riis, New York gettolarını fotoğrafladı. Bu kareler o kadar etkiliydi ki, ABD Başkanı Roosevelt bile sosyal reformlar başlatmak zorunda kaldı."}, {"n": 4, "correct": "Saigon İnfaz Fotoğrafı", "wrong": ["Televizyon Haberleri", "Barış Gösterileri"], "aciklama": "1968'de Vietnam'da çekilen tek bir infaz karesi, Pulitzer kazandı ve savaşın haklılığını sorgulatan en büyük simge oldu."}, {"n": 5, "correct": "Napalm Kız Fotoğrafı", "wrong": ["Askeri Strateji", "Diplomatik Görüşme"], "aciklama": "1972'de Nick Ut, bombalardan kaçan 9 yaşındaki o kızı fotoğrafladı. Bu kare, bir ordunun kazandığı savaşı \"kamuoyu vicdanında\" kaybettirdi."}, {"n": 6, "correct": "Bir Savaşın Sonu", "wrong": ["Siyasal Seçimler", "Yeni Basın Yasası"], "aciklama": "Bu fotoğraflar, evdeki insanların savaşı nasıl gördüğünü değiştirdi. ABD 1973'te Vietnam'dan çekildi; kamuoyu artık eskisi gibi savaşların yanında durmuyordu."}], "creator": "Önceki"}, {"num": 42, "title": "Voltaire’den Modern Laikliğe", "meta": "5 Haziran 2026 | Zorluk: ⭐⭐⭐ | Konu: Felsefe & Toplum", "start": "Voltaire'in Candide Eseri", "steps": [{"n": 1, "correct": "Kilise Otoritesinin Sorgulanması", "wrong": ["Yeni Bir Din Arayışı", "Roman Sanatının Doğuşu"], "aciklama": "Voltaire, Candide ile \"her şey yolunda\" diyen iyimserliği ve sarsılmaz kilise otoritesini zekice eleştirdi. Bu, özgür düşüncenin fitilini ateşledi."}, {"n": 2, "correct": "Encyclopédie'nin Yasaklanması", "wrong": ["Matbaanın Kapatılması", "Üniversite Reformları"], "aciklama": "Diderot'nun hazırladığı dev ansiklopedi, bilgiyi dinin tekelinden çıkarıp halka yaydığı için iki kez yasaklandı ama el altından tüm Avrupa'ya yayıldı."}, {"n": 3, "correct": "Kilise Mülklerine El Konulması", "wrong": ["Saray Baskını", "Köylülerin Şehre İnişi"], "aciklama": "Fransız Devrimi patlak verdiğinde sadece krallık değil, kilise de hedefteydi. 1789'da kilisenin devasa toprakları devlet kontrolüne geçti."}, {"n": 4, "correct": "Napolyon'un Anlaşması (Concordat)", "wrong": ["Yeni Takvim İcadı", "Haçlı Seferleri Sonu"], "aciklama": "Napolyon, din ve devleti tamamen koparmak yerine bir denge kurmaya çalıştı ama dinin artık devlet yönetiminde bir \"karar verici\" olmadığını tescilledi."}, {"n": 5, "correct": "1905 Laiklik Yasası", "wrong": ["Avrupa Birliği Anayasası", "İnsan Hakları Beyannamesi"], "aciklama": "Fransa'da kabul edilen bu yasayla devlet, artık hiçbir dini finanse etmeyeceğini ve resmen tanımayacağını ilan ederek \"laiklik\" kavramını modernleştirdi."}, {"n": 6, "correct": "Modern Laik Devlet Modeli", "wrong": ["Küresel İnanç Özgürlüğü", "Sivil Toplum Örgütleri"], "aciklama": "Voltaire'in bir roman sayfasında başlattığı sorgulama, bugün modern demokrasilerin temel taşı olan din ve devlet işlerinin ayrılmasına ulaştı."}], "creator": "Önceki"}, {"num": 43, "title": "Haritadan Konum Atmaya", "meta": "6 Haziran 2026 | Zorluk: ⭐⭐ | Konu: Coğrafya & Teknoloji", "start": "Elle Çizilen Deniz Haritaları", "steps": [{"n": 1, "correct": "Pusula ve Ufuk Çizgisi", "wrong": ["Yıldız Falı", "Gemici Düğümleri"], "aciklama": "Eskiden haritalar canavarlarla ve efsanelerle doluydu. Pusulanın yaygınlaşmasıyla denizciler hayallerini değil, gördükleri kıyıları çizmeye başladı."}, {"n": 2, "correct": "Greenwich Meridyeni", "wrong": ["Ekvator Çizgisi", "Saat Kuleleri"], "aciklama": "Her ülke kendi saatini ve konumunu kullanınca işler karıştı. 1884'te Londra'daki Greenwich \"sıfır noktası\" kabul edildi; dünya tek bir saate bağlandı."}, {"n": 3, "correct": "Askeri Uydu Sistemleri", "wrong": ["Hava Durumu Raporu", "Gizli Telsiz Hattı"], "aciklama": "Soğuk Savaş sırasında ABD, füzelerinin yerini belirlemek için GPS'in atası olan uydu ağını kurdu. Konum artık bir \"askeri sırdı\"."}, {"n": 4, "correct": "GPS'in Sivil Kullanıma Açılması", "wrong": ["İnternetin İcadı", "İlk Dokunmatik Ekran"], "aciklama": "1983'te rota şaşırıp düşürülen bir yolcu uçağının ardından ABD, GPS'i sivil kullanıma açma kararı aldı. Tam doğrulukta sinyal ise ancak 2000'de mümkün oldu."}, {"n": 5, "correct": "Dijital Sokak Haritaları", "wrong": ["Araç Telefonları", "Kağıt Katlama Sanatı"], "aciklama": "Arabalara takılan hantal cihazlar, internetle birleşince mahalle mahalle sokakları gösteren dijital rehberlere dönüştü."}, {"n": 6, "correct": "Akıllı Telefon ve Konum Paylaşma", "wrong": ["Drone Teslimatı", "Sanal Tur Rehberi"], "aciklama": "Piri Reis'in ceylan derisine çizdiği o gizemli haritalardan, bugün arkadaşımıza \"canlı konum\" attığımız dijital dünyaya ulaştık."}], "creator": "Önceki"}, {"num": 44, "title": "Penisilin’den Antibiyotik Direncine", "meta": "7 Haziran 2026 | Zorluk: ⭐ | Konu: Sağlık & Bilim", "start": "Unutulan Bir Deney Kabı", "steps": [{"n": 1, "correct": "Küf Mantarının Keşfi", "wrong": ["Bakteri Üretimi", "Kimyasal Temizlik"], "aciklama": "Alexander Fleming, tatilden döndüğünde laboratuvardaki bir kabın küflendiğini ama bu küfün etrafındaki bakterilerin öldüğünü fark etti. Şans eseri bir devrim başlıyordu."}, {"n": 2, "correct": "Seri Penisilin Üretimi", "wrong": ["Eczane Zincirleri", "Hastane Hijyeni"], "aciklama": "II. Dünya Savaşı sırasında binlerce askeri enfeksiyondan kurtarmak için bu küften ilaç üretildi. Penisilin artık \"mucize ilaç\" olarak anılıyordu."}, {"n": 3, "correct": "Bakteriyel Hastalıklara Çare", "wrong": ["Genetik Araştırmalar", "Vitamin Hapları"], "aciklama": "Eskiden öldürücü olan zatürre veya basit bir yara enfeksiyonu artık bir hapla iyileşebiliyordu. Bir nesil önce ölümcül sayılan hastalıklar tedavi edilebilir hale geldi."}, {"n": 4, "correct": "Gereksiz Reçete Yazımı", "wrong": ["Doğal Yaşam Modası", "Spor Salonları"], "aciklama": "Penisilin o kadar başarılıydı ki, her ufak sorunda kullanılmaya başlandı. \"Hemen bir antibiyotik alalım\" devri başladı."}, {"n": 5, "correct": "Bakterilerin Akıllanması", "wrong": ["İlaç Fiyatlarının Artışı", "Yan Etkilerin Keşfi"], "aciklama": "Bakteriler bu ilaçlara karşı hayatta kalmayı öğrendi. İlaçları tanıyıp onlara karşı \"zırh\" geliştiren süper bakteriler doğdu."}, {"n": 6, "correct": "Küresel Antibiyotik Direnci", "wrong": ["Yeni Virüs Salgını", "Robotik Cerrahi"], "aciklama": "Fleming'in o kirli kabından çıkan mucize, bugün yanlış kullanım yüzünden en büyük tehditlerden birine dönüştü. Doğa her zaman bir yolunu buluyor."}], "creator": "Önceki"}, {"num": 45, "title": "Kahvehaneden Ofis Kültürüne", "meta": "8 Haziran 2026 | Zorluk: ⭐ | Konu: Kültür & İş Dünyası", "start": "Etiyopya’da Kahve Keşfi", "steps": [{"n": 1, "correct": "İlk İstanbul Kahvehaneleri", "wrong": ["Saray Mutfakları", "Baharat Pazarı"], "aciklama": "Bir çobanın keçilerinin kahve yiyip canlandığını görmesiyle başlayan serüven, İstanbul’da insanların sohbet ettiği ilk mekanları doğurdu."}, {"n": 2, "correct": "Avrupa’da Akılcı Tartışmalar", "wrong": ["Şarap Kültürünün Sonu", "İlk Gazete İlanı"], "aciklama": "Kahve Avrupa'ya ulaştığında \"uyandıran içecek\" olarak popülerleşti. İnsanlar sarhoş olup kavga etmek yerine, kahve içip politika ve bilim tartışmaya başladı."}, {"n": 3, "correct": "Lloyd’s Sigorta ve Borsa", "wrong": ["Kraliyet Sarayı", "İlk Üniversiteler"], "aciklama": "Londra’daki kahvehaneler ticaretin merkezi oldu. Dünyanın en büyük sigorta şirketi Lloyd's, aslında bir kahvehanede kurulan bir tüccar kulübüydü."}, {"n": 4, "correct": "Ofis ve Mesai Kavramı", "wrong": ["Evden Çalışma", "Fabrika İşçiliği"], "aciklama": "Sanayi Devrimi ile ticaret ciddileşti. Kahvehanelerdeki o serbest çalışma ruhu, yerini \"masabaşı işi\" ve mesai saatlerine bıraktı."}, {"n": 5, "correct": "Plazalarda Kahve Molası", "wrong": ["Çay Saati Modası", "Öğle Yemeği Tatili"], "aciklama": "Modern ofislerin olmazsa olmazı kahve makineleri oldu. Kahve artık sadece bir içecek değil, iş verimliliğini artıran bir \"yakıt\" gibi görülüyordu."}, {"n": 6, "correct": "Co-Working ve Freelance Hayat", "wrong": ["Emeklilik Hayalleri", "Şehirlerarası Seyahat"], "aciklama": "Döngü tamamlandı! Bugün insanlar plazalardan çıkıp ellerinde laptoplarla tekrar kahvehanelere (modern kafelere) dönerek çalışıyor."}], "creator": "Önceki"}, {"num": 46, "title": "Demir Ağlardan Hızlı Trene 🇹🇷", "meta": "9 Haziran 2026 | Zorluk: ⭐ | Konu: Türkiye & Ulaşım", "start": "Hicaz Demiryolu Projesi", "steps": [{"n": 1, "correct": "Anadolu'da Ray Döşeme", "wrong": ["İlk Karayolu İnşası", "Deve Kervanları Sonu"], "aciklama": "Osmanlı döneminde başlayan demir yolu hamlesi, Anadolu'nun mahrumiyetini bitirmeyi ve kıtaları birbirine bağlamayı hedefliyordu."}, {"n": 2, "correct": "\"Demir Ağlarla Ördük\" Dönemi", "wrong": ["Uçak Fabrikası", "Gemi Tersaneleri"], "aciklama": "Cumhuriyetin ilk yıllarında demir yolları bir bağımsızlık meselesiydi. Onuncu Yıl Marşı'na giren o meşhur dize, binlerce kilometrelik bir emeğin özetiydi."}, {"n": 3, "correct": "Anadolu Ekspresi Yolculukları", "wrong": ["Şehirlerarası Otobüsler", "Özel Araç  ve Isı", "wrong": ["Dokunmatik Ekran", "Kablosuz İnternet"], "aciklama": "Dünyanın ilk dijital bilgisayarı o kadar büyüktü ki koca bir odayı kaplıyor ve çalışırken bir mahalleyi ısıtacak kadar enerji harcıyordu."}, {"n": 2, "correct": "Transistörün İcadı", "wrong": ["İlk Bilgisayar Oyunu", "Renkli Monitör"], "aciklama": "1947'de transistör icat edilince dev tüplere gerek kalmadı. Bilgisayarlar küçülmeye, hızlanmaya ve soğumaya başladı."}, {"n": 3, "correct": "Kişisel Bilgisayar (PC) Devrimi", "wrong": ["İnternet Kafeler", "CD-ROM Kullanımı"], "aciklama": "Bilgisayarlar odalardan çıkıp çalışma masalarına girdi. Artık sadece bilim insanları değil, sıradan insanlar da dosya oluşturabiliyordu."}, {"n": 4, "correct": "Mikroçiplerin Küçülmesi", "wrong": ["Büyük Ekran Modası", "Disketi Yerleştirme"], "aciklama": "Çipler o kadar küçüldü ki, bir zamanlar oda dolduran güç artık bir çantaya (Laptop) sığabilir hale geldi."}, {"n": 5, "correct": "Akıllı Telefon Çağı", "wrong": ["Masaüstü Telefonlar", "Dijital Fotoğraf Makinesi"], "aciklama": "Bilgisayar artık cebimize girdi. Artık yanımızda sadece bir hesap makinesi değil, koca bir kütüphane ve iletişim merkezi taşıyorduk."}, {"n": 6, "correct": "Giyilebilir Teknoloji", "wrong": ["Hologram Görüntü", "Robot Hizmetçiler"], "aciklama": "Ve nihayet bilgisayar vücudumuzun bir parçası oldu. Akıllı saatlerle tüm o teknolojik güç, şimdi sadece bileğimizdeki küçük bir ekrana sığıyor."}], "creator": "Önceki"}, {"num": 52, "title": "Pamuk Tarlasından Hızlı Modaya", "meta": "15 Haziran 2026 | Zorluk: ⭐⭐ | Konu: Ekonomi & Tarih", "start": "Amerikan Pamuk Plantasyonları", "steps": [{"n": 1, "correct": "Buharlı Dokuma Tezgahı", "wrong": ["Yün Eğirme Çıkrığı", "İpek Tezgahı Atölyesi"], "aciklama": "Ucuz Amerikan pamuğu İngiltere'ye akınca el tezgahları yetersiz kaldı. Çözüm, devasa hammaddeyi işleyip üretimi katlayacak olan buharlı dokuma tezgahlarıydı."}, {"n": 2, "correct": "Tekstil Fabrikalarının Doğuşu", "wrong": ["Köy Pazarlarının Büyümes orrect": "Mühendislik ve Yazılım Odaklı Dönüşüm", "wrong": ["Pilot Montu Tasarımları", "Helikopter Alımları"], "aciklama": "Metal üretiminden ziyade akıllı sistemlere odaklanıldı. Türk mühendisler, havacılıkta fark yaratacak olan \"yazılım ve kontrol\" sistemleri üzerinde uzmanlaştı."}, {"n": 6, "correct": "Modern İHA ve SİHA Ekosistemi", "wrong": ["Yolcu Uçağı Tasarımı", "Hava Savunma Balonları"], "aciklama": "Bugün Türkiye, dünyanın en gelişmiş insansız hava araçlarını üreten ülkelerden biri. Vecihi Hürkuş’un yarım kalan hayali, otonom teknolojilerle gökyüzüne geri döndü."}], "creator": "Önceki"}, {"num": 90, "title": "Ay Yarışı'ndan Mars Hayali'ne", "meta": "12 Kasım 2026 | Zorluk: ⭐⭐⭐ | Konu: Uzay & Teknoloji", "start": "Sputnik 1’in Uzaya Gönderilmesi", "steps": [{"n": 1, "correct": "İnsanın Uzaya İlk Çıkışı", "wrong": ["İlk Teleskop Gözlemleri", "Roket Yakıtı Deneyleri"], "aciklama": "Bir makineden sonra bir insanın uzaya çıkması, sınırları dünya dışına taşıdı. Artık gökyüzü sadece izlenen değil, gidilen bir yerdi."}, {"n": 2, "correct": "Apollo 11 ve Ay’a İniş", "wrong": ["Uzay Mekiklerinin Tasarımı", "Satürn Halkalarının Keşfi"], "aciklama": "\"İnsan için küçük, insanlık için büyük adım.\" Ay’a ayak basılması, imkansız görülenin başarıldığı en büyük teknolojik zafer oldu."}, {"n": 3, "correct": "Uluslararası Uzay İstasyonu (ISS)", "wrong": ["Yıldız Savaşları Projesi", "Yeni Gezegen İsimleri"], "aciklama": "Rekabet yerini iş birliğine bıraktı. Farklı ülkelerden astronotlar, dünyanın yörüngesinde beraber yaşamaya ve bilimsel araştırmalar yapmaya başladı."}, {"n": 4, "correct": "Özel Sektörün Uzay Yarışına Girişi", "wrong": ["Astronomi Kitaplarının Artışı", "Uydu TV Yayınları"], "aciklama": "Uzay artık sadece devletlerin tekelinde değildi. Girişimciler, maliyetleri düşüren \"yeniden kullanılabilir roketler\" ile sektörü ticari bir alana dönüştürdü."}, {"n": 5, "correct": "Mars Keşif Robotları (Rover)", "wrong": ["Güneş Paneli Yatırımları", "Bilim Kurgu Filmlerinin Etkisi"], "aciklama": "İnsan gitmeden önce makineler Mars’a ulaştı. Oradan gelen veriler, kızıl gezegenin bir zamanlar yaşanabilir olabileceğine dair kanıtlar sundu."}, {"n": 6, "correct": "Mars'ta Koloni ve Çoklu Gezegen Yaşamı", "wrong": ["Uzay Turizmi Biletleri", "Ay Madenciliği"], "aciklama": "Rover'ların topladığı veriler Mars'ı somut bir hedef haline getirdi. Kalıcı yerleşim henüz gerçekleşmedi ancak devletler ve özel sektör bu yönde aktif çalışmalar yürütüyor."}], "creator": "Önceki"}, {"num": 91, "title": "Köy Enstitüleri'nden Dijital Eğitime 🇹🇷", "meta": "13 Kasım 2026 | Zorluk: ⭐⭐ | Konu: Türkiye & Eğitim", "start": "Köy Enstitüleri'nin Kuruluşu", "steps": [{"n": 1, "correct": "Uygulamalı Eğitim ve Üretim", "wrong": ["Şehir Kolejlerinin Artışı", "Yabancı Dil Kursları"], "aciklama": "Enstitüler, sadece kitaptan değil; tarlada, atölyede ve sosyal yaşamda öğrenmeyi temel aldı. Köylü, kendi okulunu inşa eden bir aydınlanma öncüsü oldu."}, {"n": 2, "correct": "Klasik Eğitim Sistemine Dönüş", "wrong": ["Üniversite Sınavlarının Başlaması", "Okul Üniforması Standartları"], "aciklama": "Enstitülerin kapanışıyla eğitim yeniden sınıflara ve teorik derslere sıkıştı. Öğrenci artık \"üreten\" değil, \"bilgi alan\" konumuna geçti."}, {"n": 3, "correct": "Televizyon Yoluyla Açıköğretim", "wrong": ["Okuma Yazma Seferberliği", "Kütüphane Haftaları"], "aciklama": "Eğitim fiziksel binaları aştı. TRT ekranlarından verilen derslerle, okula gidemeyen milyonlarca kişi diploma alma ve kendini geliştirme şansı buldu."}, {"n": 4, "correct": "İnternet ve \"E-Okul\" Sistemleri", "wrong": ["Ansiklopedi Satışları", "Kırtasiye Mağazaları"], "aciklama": "Notlar, devamsızlıklar ve kayıtlar dijitalleşti. Veli ve öğrenci, okulun idari süreçlerine artık bir ekran üzerinden ulaşabiliyordu."}, {"n": 5, "correct": "Kitlesel Çevrimiçi Kurslar (MOOC)", "wrong": ["Özel Ders Büroları", "Tablet Dağıtım Kampanyaları"], "aciklama": "Dünyanın en iyi üniversitelerinin dersleri bir tık uzağımıza geldi
